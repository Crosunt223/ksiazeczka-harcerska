<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ksiazeczka Harcerska</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* Franklin Gothic Book - local install first, then system fallbacks */
@font-face {
    font-family: 'Franklin Gothic Book';
    src: local('Franklin Gothic Book'),
         local('FranklinGothic-Book'),
         local('Franklin Gothic'),
         local('ITC Franklin Gothic Std Book');
    font-weight: normal;
    font-style: normal;
}
</style>
<style>
:root{
  --f9:#0d1f14;--f8:#1a3424;--f7:#243d2b;--f6:#2d5016;--f5:#3a6b1e;
  --f4:#4e8a2a;--f3:#6aaa3d;--f2:#a8d080;--f1:#d4eab8;--f0:#eef7e2;
  --amber:#c97d1a;
  --bg:#f5f7f0;--panel:#fff;--panel2:#eef2e8;
  --text:#1a2e1d;--muted:#6b7c6e;--border:#dde8d0;
  --shadow:0 2px 12px rgba(13,31,20,.07);--shadow-lg:0 8px 40px rgba(13,31,20,.14);
  --r:14px;--rs:9px;
  --nav-h:70px;--topbar-h:54px;
  --primary:#2e7d32;--primary-dark:#1b3a28;--primary-light:#4caf50;
  --accent:#ff6f00;--bg-body:#f7f9f5;--bg-panel:#fff;--bg-input:#f8fafc;
  --text-main:#2c3e50;--text-muted:#7f8c8d;--border-color:#e2e8f0;
}
body.dark{
  --bg:#0f1a10;--panel:#172218;--panel2:#1d2e1e;
  --text:#d8ecc8;--muted:#7a9c7e;--border:#253525;
  --bg-body:#121212;--bg-panel:#1e1e1e;--bg-input:#2c2c2c;
  --text-main:#e0e0e0;--text-muted:#a0a0a0;--border-color:#333;
}
body.dark-mode{
  --bg:#0f1a10;--panel:#172218;--panel2:#1d2e1e;
  --text:#d8ecc8;--muted:#7a9c7e;--border:#253525;
}
body.large-text{font-size:20px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Barlow", sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s;}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* ══════════════════════════════════════════════
   LOGIN OVERLAY
══════════════════════════════════════════════ */
#loginOverlay{
  position:fixed;inset:0;
  background:linear-gradient(155deg,var(--f9) 0%,var(--f7) 55%,var(--f5) 100%);
  display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px;
}
.login-box{
  background:rgba(255,255,255,.97);border-radius:22px;padding:44px 36px;
  width:100%;max-width:360px;max-height:92vh;overflow-y:auto;
  box-shadow:0 24px 64px rgba(0,0,0,.38);
}
body.dark .login-box{background:rgba(23,34,24,.97);}
.login-box h2{
  font-family:"Franklin Gothic Book", "Franklin Gothic Medium", "ITC Franklin Gothic", Arial Narrow, sans-serif;font-size:2rem;color:var(--f8);
  margin-bottom:24px;text-align:center;
}
body.dark .login-box h2{color:var(--f2);}
.login-box input,.login-box select{
  width:100%;padding:13px 15px;border:1.5px solid var(--border);
  border-radius:var(--rs);background:var(--bg);color:var(--text);
  font-family:"Barlow", sans-serif;font-size:.95rem;outline:none;
  transition:.2s;margin-bottom:10px;display:block;
}
.login-box input:focus,.login-box select:focus{
  border-color:var(--f4);box-shadow:0 0 0 3px rgba(78,138,42,.13);
}
.btn-main{
  width:100%;padding:14px;
  background:linear-gradient(135deg,var(--f5),var(--f3));
  border:none;border-radius:var(--rs);color:#fff;font-weight:600;
  font-size:1rem;cursor:pointer;transition:.2s;margin-top:4px;
  font-family:"Barlow", sans-serif;
}
.btn-main:hover{opacity:.9;transform:translateY(-1px);}
.btn-link{
  width:100%;padding:11px;background:transparent;
  border:1.5px solid var(--border);border-radius:var(--rs);
  color:var(--muted);font-size:.88rem;cursor:pointer;transition:.2s;
  margin-top:8px;font-family:"Barlow", sans-serif;
}
.btn-link:hover{border-color:var(--f4);color:var(--f5);}
.login-msg{font-size:.83em;padding:8px 12px;border-radius:var(--rs);margin-top:8px;display:none;}
.login-msg.error  {background:#fee8e8;color:#c33;display:block;}
.login-msg.success{background:#e8f5e9;color:#2e7d32;display:block;}
.login-msg.info   {background:#e3f2fd;color:#1565c0;display:block;}

/* ══════════════════════════════════════════════
   WYBIERZ DRUŻYNĘ (krok 2 rejestracji)
══════════════════════════════════════════════ */
#teamPickOverlay{
  position:fixed;inset:0;
  background:linear-gradient(155deg,var(--f9) 0%,var(--f7) 55%,var(--f5) 100%);
  display:none;align-items:center;justify-content:center;z-index:10000;padding:20px;
}
#teamPickOverlay.active{display:flex;}
.team-pick-box{
  background:var(--f8);border-radius:22px;padding:36px 28px;
  width:100%;max-width:340px;text-align:center;
  box-shadow:0 24px 64px rgba(0,0,0,.55);
}
.team-pick-title{
  font-family:"Franklin Gothic Book", "Franklin Gothic Medium", "ITC Franklin Gothic", Arial Narrow, sans-serif;font-size:1.3rem;font-weight:700;
  color:var(--amber);letter-spacing:2px;text-transform:uppercase;margin-bottom:24px;
}
.team-pick-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.team-pick-btn{
  padding:14px 20px;border-radius:var(--rs);
  border:2px solid rgba(168,208,128,.25);
  background:rgba(255,255,255,.05);
  color:var(--f1);font-size:.95rem;font-weight:500;
  cursor:pointer;transition:.2s;font-family:"Barlow", sans-serif;
}
.team-pick-btn:hover{background:rgba(78,138,42,.2);border-color:var(--f3);}
.team-pick-btn.sel{
  background:var(--amber);border-color:var(--amber);color:#fff;font-weight:700;
}
.team-pick-confirm{
  width:100%;padding:14px;
  background:linear-gradient(135deg,var(--f5),var(--f3));
  border:none;border-radius:var(--rs);color:#fff;font-weight:700;
  font-size:1rem;cursor:pointer;font-family:"Barlow", sans-serif;
  display:none;transition:.2s;
}
.team-pick-confirm.show{display:block;}
.team-pick-confirm:hover{opacity:.9;}
.team-pick-back{
  margin-top:14px;background:none;border:none;
  color:rgba(168,208,128,.6);font-size:.83rem;cursor:pointer;
  font-family:"Barlow", sans-serif;text-decoration:underline;
}

/* ══════════════════════════════════════════════
   OCZEKIWANIE NA AKCEPTACJĘ
══════════════════════════════════════════════ */
#pendingScreen{
  position:fixed;inset:0;background:var(--bg);
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:7999;padding:40px;text-align:center;
}
#pendingScreen.active{display:flex;}
.pending-icon{font-size:3.5rem;margin-bottom:20px;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
.pending-title{
  font-family:"Franklin Gothic Book", "Franklin Gothic Medium", "ITC Franklin Gothic", Arial Narrow, sans-serif;font-size:1.5rem;
  color:var(--text);margin-bottom:12px;
}
.pending-sub{color:var(--muted);font-size:.92rem;line-height:1.65;max-width:280px;}
.pending-logout{
  margin-top:32px;padding:10px 22px;
  background:transparent;border:1.5px solid var(--border);
  border-radius:var(--rs);color:var(--muted);cursor:pointer;
  font-size:.85rem;font-family:"Barlow", sans-serif;transition:.2s;
}
.pending-logout:hover{border-color:var(--f4);color:var(--f5);}

/* ══════════════════════════════════════════════
   APP SHELL
══════════════════════════════════════════════ */
#appShell{display:none;flex-direction:column;height:100vh;overflow:hidden;}

/* TOPBAR */
.topbar{
  height:var(--topbar-h);background:var(--f9);
  display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;
}
.topbar-brand{
  font-family:"Franklin Gothic Book", "Franklin Gothic Medium", "ITC Franklin Gothic", Arial Narrow, sans-serif;font-size:1rem;
  color:#e8f5d0;flex:1;cursor:pointer;line-height:1.2;
}
.topbar-brand small{display:block;font-size:.65rem;color:#6a9a6a;}

/* BODY */
.app-body{flex:1;display:flex;overflow:hidden;}

/* SIDEBAR */
.sidebar{
  width:260px;background:var(--f9);color:var(--f1);
  display:flex;flex-direction:column;flex-shrink:0;
  border-right:1px solid rgba(255,255,255,.05);overflow:hidden;
}
.sidebar-search{padding:12px 12px 6px;}
.sidebar-search input{
  width:100%;padding:9px 13px;border-radius:30px;border:none;
  background:rgba(255,255,255,.08);color:var(--f1);
  font-size:.86rem;outline:none;transition:.2s;
  font-family:"Barlow", sans-serif;
}
.sidebar-search input::placeholder{color:#4a6a4a;}
.sidebar-search input:focus{background:rgba(255,255,255,.14);}
.nav-list{flex:1;overflow-y:auto;list-style:none;padding:4px 8px 20px;}
.nav-list::-webkit-scrollbar{width:3px}
.nav-category{padding:14px 10px 5px;font-size:.64rem;text-transform:uppercase;letter-spacing:1.5px;color:#456645;font-weight:700;}
.nav-circle-img{
  width:28px;height:28px;border-radius:50%;object-fit:contain;
  flex-shrink:0;margin-right:6px;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.2));
}
.nav-circle-empty{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;margin-right:6px;
  border:1.5px dashed rgba(255,255,255,.15);background:rgba(255,255,255,.03);
}
.nav-item-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.nav-item{
  padding:9px 12px;border-radius:var(--rs);cursor:pointer;
  display:flex;align-items:center;gap:0;
  color:#88b078;font-size:.87rem;transition:.15s;margin-bottom:2px;
}
.nav-item:hover{background:rgba(255,255,255,.07);color:var(--f1);}
.nav-item.active{background:linear-gradient(90deg,var(--f4),var(--f3));color:#fff;font-weight:600;}
.nav-progress{font-size:.67rem;font-weight:700;background:rgba(0,0,0,.25);padding:2px 7px;border-radius:20px;}
.nav-item.active .nav-progress{background:rgba(255,255,255,.2);}

/* SIDEBAR OVERLAY (mobile) */
.sidebar-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.5);z-index:200;backdrop-filter:blur(2px);
}
.sidebar-overlay.active{display:block;}

/* CONTENT */
.content-scroll{flex:1;overflow-y:auto;padding:24px 24px 90px;}
.content-wrap{max-width:780px;margin:0 auto;}

/* ══════════════════════════════════════════════
   BOTTOM NAV — jak na screenshocie
══════════════════════════════════════════════ */
.bottom-nav{
  height:var(--nav-h);
  background:var(--f8);
  border-top:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;justify-content:space-around;
  padding:0 8px;flex-shrink:0;
}
.bnav-btn{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;
  cursor:pointer;padding:6px 4px;border-radius:var(--rs);
  transition:.18s;color:#4a6a4a;border:none;background:none;
  font-family:"Barlow", sans-serif;
}
.bnav-btn:hover{color:var(--f2);}
.bnav-btn.active{color:var(--f1);}
.bnav-icon{
  width:40px;height:40px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.35rem;transition:.18s;
}
.bnav-btn.active .bnav-icon{
  background:rgba(106,170,61,.2);
}
.bnav-label{font-size:.59rem;font-weight:600;letter-spacing:.3px;text-transform:uppercase;}

/* Placeholder kafelki */
.zastep-drop-zone{
  min-height:44px;padding:6px;border-radius:var(--rs);
  border:2px dashed transparent;transition:.2s;display:flex;flex-wrap:wrap;gap:4px;align-items:center;
}
.zastep-drop-zone.drag-over{
  border-color:var(--amber);background:rgba(255,180,0,.07);
}
.member-chip:active{cursor:grabbing;}
.member-picker-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);font-size:.88rem;display:flex;align-items:center;gap:8px;}
.member-picker-item:hover{background:var(--panel2);}
.team-edit-panel{
  background:var(--panel);border-radius:var(--r);border:1px solid var(--border);
  padding:20px;margin-top:16px;display:flex;flex-direction:column;gap:14px;
  max-width:420px;margin-left:auto;margin-right:auto;
}
.team-edit-row{display:flex;flex-direction:column;gap:6px;}
.team-edit-label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
.team-profile-card{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:60vh;text-align:center;
}
.team-profile-img{
  width:160px;height:160px;border-radius:24px;object-fit:cover;
  border:3px solid var(--f4);box-shadow:0 8px 32px rgba(13,31,20,.18);
  margin-bottom:20px;background:var(--panel2);
}
.team-profile-name{
  font-family:"Franklin Gothic Book", "Franklin Gothic Medium", "ITC Franklin Gothic", Arial Narrow, sans-serif;font-size:1.6rem;
  color:var(--text);font-weight:700;
}
.profile-card{
  background:var(--panel);border-radius:var(--r);box-shadow:var(--shadow);
  padding:32px 24px 24px;margin-bottom:16px;border:1px solid var(--border);
  text-align:center;
}
.profile-avatar-wrap{position:relative;display:inline-block;margin-bottom:16px;}
.profile-avatar{
  width:100px;height:100px;border-radius:50%;object-fit:cover;
  border:3px solid var(--f4);box-shadow:0 4px 16px rgba(13,31,20,.15);
  background:var(--panel2);
}
.profile-avatar-edit{
  position:absolute;bottom:2px;right:2px;
  width:28px;height:28px;border-radius:50%;
  background:var(--amber);border:none;color:#fff;
  font-size:.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.profile-name{
  font-family:"Franklin Gothic Book", "Franklin Gothic Medium", "ITC Franklin Gothic", Arial Narrow, sans-serif;font-size:1.5rem;
  color:var(--text);margin-bottom:6px;font-weight:700;
}
.profile-edit-name-btn{
  background:none;border:none;color:var(--muted);font-size:.82rem;
  cursor:pointer;text-decoration:underline;margin-bottom:10px;
  font-family:"Barlow", sans-serif;
}
.profile-role-badge{
  display:inline-block;padding:4px 14px;border-radius:20px;
  background:var(--panel2);color:var(--f4);font-size:.78rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;
}
.profile-team{
  color:var(--muted);font-size:.9rem;margin-top:4px;
}
.profile-edit-form{
  background:var(--panel2);border-radius:var(--rs);
  padding:16px;margin-top:12px;text-align:left;
  border:1px solid var(--border);
}
.placeholder-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:60vh;color:var(--muted);
}
.placeholder-screen .ph-icon{font-size:4rem;margin-bottom:16px;opacity:.35;}
.placeholder-screen p{font-size:.95rem;opacity:.5;}

/* MOBILE */
@media(max-width:900px){
  .sidebar{
    position:fixed;top:var(--topbar-h);left:0;
    bottom:var(--nav-h);width:82%;max-width:300px;
    z-index:300;transform:translateX(-110%);
    transition:transform .28s;
    box-shadow:8px 0 32px rgba(0,0,0,.35);
  }
  .sidebar.open{transform:translateX(0);}
  .content-scroll{padding:20px 16px 88px;}
}

/* CONTENT CARDS */
.header-section{
  background:var(--panel);border-radius:var(--r);box-shadow:var(--shadow);
  padding:24px 24px 20px;margin-bottom:20px;border-left:4px solid var(--amber);
}
.cat-badge{
  display:inline-block;background:var(--panel2);color:var(--f5);
  padding:3px 11px;border-radius:20px;font-size:.7rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;
}
body.dark .cat-badge{color:var(--f2);}
.header-section h2{
  font-family:"Franklin Gothic Book", "Franklin Gothic Medium", "ITC Franklin Gothic", Arial Narrow, sans-serif;font-size:1.75rem;
  color:var(--text);margin:6px 0 16px;
}
.big-progress-wrapper{background:var(--panel2);height:7px;border-radius:4px;overflow:hidden;}
.big-progress-fill{
  height:100%;border-radius:4px;
  background:linear-gradient(90deg,var(--f5),var(--f3));
  transition:width .8s cubic-bezier(.34,1.56,.64,1);width:0%;
}
.progress-label{display:flex;justify-content:space-between;font-size:.8rem;color:var(--muted);margin-bottom:5px;}
.task-group{margin-bottom:22px;}
.group-title{font-size:.7rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:700;margin-bottom:10px;padding-left:3px;}
.cb-container{
  display:flex;align-items:flex-start;gap:13px;background:var(--panel);
  padding:13px 16px;border-radius:var(--rs);margin-bottom:7px;
  border:1.5px solid var(--border);cursor:pointer;transition:.16s;
}
.cb-container:hover{border-color:var(--f3);box-shadow:var(--shadow);}
.cb-container input{display:none;}
.checkmark{
  width:22px;height:22px;min-width:22px;border-radius:6px;
  border:2px solid var(--border);background:var(--panel2);
  display:flex;align-items:center;justify-content:center;
  margin-top:1px;transition:.16s;
}
.cb-container input:checked~.checkmark{background:var(--f4);border-color:var(--f4);}
.checkmark:after{
  content:"";display:none;width:5px;height:10px;
  border:solid #fff;border-width:0 2px 2px 0;
  transform:rotate(45deg) translateY(-1px);
}
.cb-container input:checked~.checkmark:after{display:block;}
.task-text{font-size:.9rem;color:var(--text);line-height:1.5;padding-top:2px;}
.cb-container input:checked~.task-text{color:var(--muted);text-decoration:line-through;}

.welcome-header{text-align:center;padding:36px 20px 28px;}
.welcome-header h2{
  font-family:"Franklin Gothic Book", "Franklin Gothic Medium", "ITC Franklin Gothic", Arial Narrow, sans-serif;font-size:2rem;
  color:var(--f5);margin-bottom:6px;
}
body.dark .welcome-header h2{color:var(--f2);}
.welcome-header p{color:var(--muted);}

.home-card{
  background:var(--panel);border-radius:var(--r);
  box-shadow:var(--shadow);padding:24px;
  margin-bottom:18px;border:1px solid var(--border);
}
.home-card h3{
  font-family:"Franklin Gothic Book", "Franklin Gothic Medium", "ITC Franklin Gothic", Arial Narrow, sans-serif;font-size:1.05rem;
  margin-bottom:14px;color:var(--text);
}
.image-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:18px;}
.gallery-img{width:100%;height:130px;object-fit:cover;border-radius:var(--rs);cursor:pointer;transition:.22s;border:2px solid var(--border);}
.gallery-img:hover{transform:scale(1.05);}

/* ADMIN */
.member-row{
  padding:12px 14px;background:var(--panel2);
  border:1.5px solid var(--border);border-radius:var(--rs);
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;
}
.btn-sm{
  padding:7px 13px;border:none;border-radius:var(--rs);
  font-weight:600;cursor:pointer;font-size:.79rem;transition:.16s;
  font-family:"Barlow", sans-serif;
}
.btn-approve{background:var(--f4);color:#fff;}.btn-approve:hover{background:var(--f5);}
.btn-reject{background:#fee8e8;color:#c33;}.btn-reject:hover{background:#fdd;}
.btn-delete{background:#fee8e8;color:#c33;}.btn-delete:hover{background:#fdd;}
.btn-view{background:var(--panel);color:var(--f5);border:1.5px solid var(--border)!important;}
.btn-view:hover{border-color:var(--f4)!important;}
.btn-teams{background:var(--panel);color:var(--text);border:1.5px solid var(--border)!important;}
.status-badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.7rem;font-weight:700;}
.status-active  {background:#e8f5e9;color:#2e7d32;}
.status-pending {background:#fff3e0;color:#e65100;}
.status-rejected{background:#ffebee;color:#c62828;}
.input-add{
  flex:1;padding:10px 13px;border:1.5px solid var(--border);
  border-radius:var(--rs);background:var(--panel2);color:var(--text);
  font-size:.9rem;outline:none;font-family:"Barlow", sans-serif;
}
.input-add:focus{border-color:var(--f4);}

/* SETTINGS MODAL */
.settings-modal{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.55);z-index:5000;
  justify-content:center;align-items:center;backdrop-filter:blur(4px);
}
.settings-content{
  background:var(--panel);padding:30px;border-radius:20px;
  width:290px;box-shadow:var(--shadow-lg);position:relative;color:var(--text);
}
.settings-content h3{
  font-family:"Franklin Gothic Book", "Franklin Gothic Medium", "ITC Franklin Gothic", Arial Narrow, sans-serif;font-size:1.15rem;
  margin-bottom:18px;color:var(--f5);
}
.close-settings{position:absolute;top:13px;right:16px;font-size:20px;cursor:pointer;color:var(--muted);}
.settings-option{
  display:flex;justify-content:space-between;align-items:center;
  padding:11px 0;border-bottom:1px solid var(--border);
}
.settings-option span{font-weight:500;font-size:.88rem;}
.switch{position:relative;display:inline-block;width:44px;height:23px;}
.switch input{opacity:0;width:0;height:0;}
.slider{position:absolute;inset:0;background:#ccc;border-radius:34px;cursor:pointer;transition:.3s;}
.slider:before{
  position:absolute;content:"";height:15px;width:15px;
  left:4px;bottom:4px;background:#fff;border-radius:50%;transition:.3s;
}
input:checked+.slider{background:var(--f4);}
input:checked+.slider:before{transform:translateX(21px);}
.settings-btn-action{
  width:100%;padding:11px;margin-top:10px;border:none;border-radius:var(--rs);
  font-weight:600;cursor:pointer;transition:.2s;font-size:.88rem;font-family:"Barlow", sans-serif;
}
.btn-reset {background:#fee8e8;color:#c33;}
.btn-logout{background:var(--f5);color:#fff;margin-top:6px;}

/* PHOTO MODAL */
#photoModal{
  display:none;position:fixed;inset:0;z-index:6000;
  background:rgba(0,0,0,.92);justify-content:center;align-items:center;
  backdrop-filter:blur(6px);
}
#modalImg{max-width:90%;max-height:90%;border-radius:var(--rs);}
#modalImg.zoomed{transform:scale(1.8);cursor:zoom-out;}
.close-modal{position:absolute;top:18px;right:26px;color:#fff;font-size:34px;cursor:pointer;}

.sprawnosc-circle-icon{
  width:72px;height:72px;border-radius:50%;object-fit:contain;
  flex-shrink:0;filter:drop-shadow(0 2px 8px rgba(0,0,0,.2));
  border:2px solid var(--border);background:var(--panel2);padding:4px;
  transition:opacity .35s ease;
}
.board-header{text-align:center;padding:16px 0 8px;}
.board-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:12px;padding:0 8px;max-width:340px;margin:0 auto;
}
.board-slot{
  aspect-ratio:1;border-radius:50%;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:.2s;position:relative;overflow:hidden;
}
.board-slot-empty{
  border:2.5px dashed rgba(255,255,255,.15);
  background:rgba(255,255,255,.03);
}
.board-slot-empty:hover{border-color:var(--amber);background:rgba(255,180,0,.06);}
.board-slot-plus{font-size:1.6rem;color:rgba(255,255,255,.2);}
.board-slot-filled{
  background:var(--panel2);border:2px solid var(--border);
  box-shadow:0 4px 16px rgba(0,0,0,.18);
}
.board-slot-filled:hover{transform:scale(1.05);box-shadow:0 6px 20px rgba(0,0,0,.25);}
.board-slot-img{width:88%;height:88%;object-fit:contain;border-radius:50%;}
.board-slot-stars{
  position:absolute;bottom:2px;left:50%;transform:translateX(-50%);
  font-size:.5rem;color:var(--amber);letter-spacing:1px;
  background:rgba(0,0,0,.45);padding:1px 5px;border-radius:8px;
}
.board-slot-name{
  display:none;position:absolute;inset:0;background:rgba(0,0,0,.7);
  font-size:.55rem;color:#fff;text-align:center;padding:4px;
  align-items:center;justify-content:center;border-radius:50%;
}
.board-slot-filled:hover .board-slot-name{display:flex;}
.board-picker-item{
  cursor:pointer;padding:6px;border-radius:10px;
  border:1.5px solid var(--border);background:var(--panel2);
  transition:.15s;
}
.board-picker-item:hover{border-color:var(--amber);background:rgba(255,180,0,.08);}
.board-picker-item.on-board{opacity:.4;cursor:default;}

<script>
// ================================================================
// KONFIGURACJA
// ================================================================
const API = 'https://harcerze-backend.onrender.com/api';

// ================================================================
// HIERARCHIA RAN
// ================================================================
var HIERARCHY = ['superadmin','ksis','instruktor','druzynowy','przyboczny','zastepowy','podzastepowy','user'];
var ROLE_LABELS = {
    'superadmin':  '&#128081; Super Admin',
    'ksis':        '&#11088; Ksis',
    'instruktor':  '&#127775; Instruktor',
    'druzynowy':   '&#128210; Druzynowy',
    'zastepowy':   '&#128203; Zastepowy',
    'podzastepowy':'&#128196; Podzastepowy',
    'user':        '&#128100; Harcerz'
};
var ROLE_COLORS = {
    'superadmin': '#7b1fa2',
    'ksis':       '#c62828',
    'instruktor': '#e65100',
    'druzynowy':  '#1565c0',
    'zastepowy':    '#2e7d32',
    'podzastepowy': '#558b2f',
    'user':         '#546e7a'
};
function rankIndex(role) {
    var i = HIERARCHY.indexOf(role);
    return i === -1 ? 999 : i;
}
function canManage(myRole, targetRole) {
    return myRole === 'superadmin' || rankIndex(myRole) < rankIndex(targetRole);
}
function availableRoles(myRole) {
    if (myRole === 'superadmin')  return ['ksis','instruktor','druzynowy','przyboczny','zastepowy','podzastepowy','user'];
    if (myRole === 'druzynowy')   return ['przyboczny','zastepowy','podzastepowy','user'];
    if (myRole === 'przyboczny')  return ['zastepowy','podzastepowy','user'];
    return [];
}

// ================================================================
// ZMIENNE GLOBALNE
// ================================================================
let db = [];
let currentUser       = null;
let authToken         = null;
let currentViewUserId = null;
let cachedProgress    = {};

// ================================================================
// INICJALIZACJA
// ================================================================
window.onload = async () => {
    loadSettings();
    db = [
        ...(typeof stopnieData    !== 'undefined' ? stopnieData    : []),
        ...(typeof sprawnosciData !== 'undefined' ? sprawnosciData : [])
    ];

    patchDbCircleVariants(); // dodaj circleVariants do każdej sprawności
    const savedToken    = localStorage.getItem('hk_token');
    const savedUser     = localStorage.getItem('hk_user');
    const savedProgress = localStorage.getItem('hk_progress');

    if (savedToken && savedUser) {
        authToken   = savedToken;
        currentUser = JSON.parse(savedUser);
        // Zaladuj cache progress od razu z localStorage
        if (savedProgress) {
            try { cachedProgress = JSON.parse(savedProgress); } catch(e) { cachedProgress = {}; }
        }
        // Inicjalizuj od razu (nie czekaj na serwer - działa offline/cold start)
        initAppAfterLogin();
        // W tle sprawdź token - tylko gdy serwer odpowie 401 to wyloguj
        apiFetch('/my-team').then(function(pingRes) {
            if (pingRes.status === 401 || pingRes.status === 403) {
                authToken = null; currentUser = null;
                localStorage.removeItem('hk_token');
                localStorage.removeItem('hk_user');
                localStorage.removeItem('hk_progress');
                loadTeams().then(function() { showPanel('login'); });
            }
            // status 0 = serwer spi (Render cold start) - nie wylogowuj
        });
    } else {
        await loadTeams();
        showPanel('login');
    }
};

// ================================================================
// PANELE LOGOWANIA
// ================================================================
function showPanel(name) {
    document.getElementById('loginOverlay').style.display = 'flex';
    document.getElementById('panelLogin').style.display    = name === 'login'    ? 'block' : 'none';
    document.getElementById('panelRegister').style.display = name === 'register' ? 'block' : 'none';
    clearMsg('loginMsg');
    clearMsg('registerMsg');
}
function showMsg(id, text, type) {
    var el = document.getElementById(id);
    if (!el) return;
    el.textContent = text;
    el.className = 'login-msg ' + (type || 'error');
}
function clearMsg(id) {

}

// ================================================================
// FETCH Z TOKENEM JWT
// ================================================================
async function apiFetch(url, options) {
    options = options || {};
    var headers = { 'Content-Type': 'application/json' };
    if (options.headers) Object.assign(headers, options.headers);
    if (authToken) headers['Authorization'] = 'Bearer ' + authToken;
    try {
        var res  = await fetch(API + url, Object.assign({}, options, { headers: headers }));
        var data = await res.json();
        // Jesli 401 - token wygasl, odswierz token lub wyloguj
        if (res.status === 401) {
            console.warn('apiFetch 401 na:', url);
        }
        return { ok: res.ok, status: res.status, data: data };
    } catch (e) {
        console.warn('apiFetch error:', url, e.message);
        return { ok: false, status: 0, data: { error: 'Blad polaczenia z serwerem' } };
    }
}

    apiFetch('/progress/' + currentUser.id).then(function(r) {

        cachedProgress = fresh;
        try { localStorage.setItem('hk_progress', JSON.stringify(cachedProgress)); } catch(e) {}
        updateUIStats(); // odswierz procenty i ikony

            if (activeId) loadContent(activeId);
        }

function refreshCircleIcon(itemId) {
    var item = db.find(function(x){ return x.id === itemId; });
    if (!item) return;

    // Upewnij sie ze item ma circleVariants (patch jesli brak)
    if (!item.circleVariants && _circleVariants && _circleVariants[item.id]) {
        item.circleVariants = _circleVariants[item.id];
    }
    if (!item.circleVariants) return;

    var opacity = getSprawOpacity(item, cachedProgress);
    var variant = getSprawVariant(item, cachedProgress);
    var imgSrc  = getCircleImgForProgress(item, cachedProgress);
    var level   = getSprawLevel(item, cachedProgress);
    var s       = getSprawDone(item, cachedProgress);

    // ── Sidebar ──
    var navEl = document.getElementById('nav-item-' + itemId);
    if (navEl) {
        var navImg   = navEl.querySelector('.nav-circle-img');
        var navEmpty = navEl.querySelector('.nav-circle-empty');
        if (navImg) {
            navImg.style.transition = 'opacity .3s';
            navImg.style.opacity    = String(opacity);
            if (navImg.getAttribute('data-src') !== imgSrc) {
                navImg.setAttribute('data-src', imgSrc);
                navImg.src = imgSrc;
            }
        } else if (navEmpty) {
            var img2 = document.createElement('img');
            img2.className = 'nav-circle-img';
            img2.src = imgSrc;
            img2.setAttribute('data-src', imgSrc);
            img2.style.cssText = 'opacity:' + opacity + ';transition:opacity .3s;width:28px;height:28px;border-radius:50%;object-fit:contain;margin-right:6px;flex-shrink:0;';
            navEmpty.parentNode.replaceChild(img2, navEmpty);
        }
    }

    // ── Header ikona ──
    var headerImg = document.querySelector('.sprawnosc-circle-icon[data-item="' + itemId + '"]');
    if (headerImg) {
        var newSrc = imgSrc;
        if (headerImg.getAttribute('data-src') !== newSrc) {
            headerImg.style.transition = 'opacity .15s';
            headerImg.style.opacity = '0.05';
            headerImg.setAttribute('data-src', newSrc);
            setTimeout(function() {
                headerImg.src = newSrc;
                headerImg.style.transition = 'opacity .35s';
                headerImg.style.opacity = String(opacity);
            }, 150);
        } else {
            headerImg.style.transition = 'opacity .35s';
            headerImg.style.opacity = String(opacity);
        }
    }

    // ── Info pod tytułem ──
    var infoEl = document.querySelector('.sprawnosc-header-info');
    if (infoEl) {
        if (s.done > 0) {
            infoEl.innerHTML = '<span style="color:var(--amber)">' + s.done + '/' + s.total + ' zadań</span>'
                + ' · zdjęcie <strong>#' + variant + '</strong>'
                + ' · <span style="color:var(--amber)">' + '★'.repeat(level) + '</span>';
        } else {
            infoEl.textContent = 'Nie zdana — ' + s.total + ' zadań do zrobienia';
        }
    }

    // ── Gwiazdki badge ──
    var badge = document.querySelector('.sprawnosc-stars-badge');
    if (badge) {
        badge.textContent   = level > 0 ? '★'.repeat(level) : '';
        badge.style.display = level > 0 ? '' : 'none';
    }
}

async function toggleTask(taskId, itemId) {
    // Kto ogląda czyje sprawnosci?
    var viewingOwnId  = (currentViewUserId === currentUser.id);
    var myRole        = currentUser.role;
    var myRank        = rankIndex(myRole);
    var targetRole    = window._currentViewUserRole || (viewingOwnId ? myRole : 'user');
    var targetRank    = rankIndex(targetRole);

    // Zasady:
    // 1. Zwykły 'user' nigdy nie może zaznaczać — tylko podgląd
    // 2. Kadra może zaznaczać TYLKO osobom NIŻEJ w hierarchii (nie sobie, nie wyżej)
    // 3. Superadmin może wszystkim
    // Kto moze co:
    // superadmin     - wszystko
    // ksis/instruktor/druzynowy - mogą sobie zdawać I osobom niżej
    // zastepowy/podzastepowy - TYLKO osobom niżej (nie sobie)
    // user           - nic
    var SELF_ALLOWED = ['superadmin','ksis','instruktor','druzynowy'];
    var canToggle = false;
    if (myRole === 'superadmin') {
        canToggle = true;
    } else if (viewingOwnId && SELF_ALLOWED.includes(myRole)) {
        canToggle = true;
    } else if (!viewingOwnId && myRole !== 'user' && myRank < targetRank) {
        canToggle = true;
    }

    if (!canToggle) {
        // Przywróć checkbox do poprzedniego stanu
        document.querySelectorAll('.cb-container input').forEach(function(inp) {
            if (inp.dataset.tid === taskId) inp.checked = !!cachedProgress[taskId];
        });
        return;
    }

    var isChecked = !cachedProgress[taskId];
    if (isChecked) cachedProgress[taskId] = true;
    else           delete cachedProgress[taskId];
    updateItemProgress(itemId);
    updateUIStats();
    refreshCircleIcon(itemId); // odswież ikone w czasie rzeczywistym

    // Zapisz do localStorage od razu (cache na wypadek odswiezenia)
    try { localStorage.setItem('hk_progress', JSON.stringify(cachedProgress)); } catch(e) {}

    var result = await apiFetch('/progress', {
        method: 'POST',
        body: JSON.stringify({ userId: currentViewUserId, taskId: taskId, status: isChecked })
    });
    if (!result.ok) {
        // Cofnij zmiany jesli serwer zwrocil blad
        if (isChecked) delete cachedProgress[taskId];
        else           cachedProgress[taskId] = true;
        try { localStorage.setItem('hk_progress', JSON.stringify(cachedProgress)); } catch(e) {}
        updateItemProgress(itemId);
        refreshCircleIcon(itemId);
        alert('Blad zapisu!');
    } else {
        // Aktualizuj cache po potwierdzeniu serwera
        try { localStorage.setItem('hk_progress', JSON.stringify(cachedProgress)); } catch(e) {}
    }
}

function buildRoleSelector(userId, currentRole, userName) {
    var roles = availableRoles(currentUser.role);
    if (roles.length === 0) return '';
    var myRank = rankIndex(currentUser.role);
    var targetRank = rankIndex(currentRole);
    // Moge zmienic tylko jesli mam wyzsza range
    if (currentUser.role !== 'superadmin' && myRank >= targetRank) return '';

    var opts = '<option value="">-- Zmien range --</option>';
    roles.forEach(function(r) {
        opts += '<option value="' + r + '"' + (r === currentRole ? ' selected' : '') + '>' + r.charAt(0).toUpperCase() + r.slice(1) + '</option>';
    });
    return '<select class="btn-sm" style="background:#e3f2fd;color:#1565c0;cursor:pointer;" data-uid="' + userId + '" data-uname="' + userName + '" onchange="promoteUser(this.dataset.uid,this.dataset.uname,this.value,this)">' + opts + '</select>';
}

function renderSidebar(filterText) {
    patchDbCircleVariants(); // upewnij sie ze circleVariants sa ustawione
    filterText = filterText || '';
    var list = document.getElementById('navList');
    list.innerHTML = '';
    var grouped = {};
    db.forEach(function(item) {
        if (!grouped[item.category]) grouped[item.category] = [];
        grouped[item.category].push(item);
    });
    Object.keys(grouped).forEach(function(cat) {
        var filtered = grouped[cat].filter(function(i) { return i.title.toLowerCase().indexOf(filterText.toLowerCase()) !== -1; });
        if (!filtered.length) return;
        var head = document.createElement('li');
        head.className = 'nav-category'; head.textContent = cat; list.appendChild(head);
        filtered.forEach(function(item) {
            var li = document.createElement('li');
            li.className = 'nav-item'; li.id = 'nav-item-' + item.id;
            var opacity  = getSprawOpacity(item, cachedProgress);
            var variant  = getSprawVariant(item, cachedProgress);
            var imgSrc   = item.circleVariants ? getCircleImgForProgress(item, cachedProgress) : null;
            var circleHtml = imgSrc
                ? '<img src="' + imgSrc + '" class="nav-circle-img" style="opacity:' + opacity + '" title="' + (variant ? 'Poziom ' + variant : 'Nie zdana') + '">'

                + '<input type="checkbox" ' + (isDone ? 'checked' : '') + ' ' + (cbReadOnly ? 'disabled' : '') + ' data-tid="' + tId + '" onchange="toggleTask(\'' + tId + '\',\'' + id + '\')">'

function updateItemProgress(itemId) {
    var item = db.find(function(x) { return x.id === itemId; });
    if (!item) return;
    var total = 0, done = 0;
    item.groups.forEach(function(g, gi) {
        g.tasks.forEach(function(t, ti) { total++; if (cachedProgress[itemId + '-' + gi + '-' + ti]) done++; });
    });
    var pct = total ? Math.round(done / total * 100) : 0;
    var bar = document.getElementById('detail-bar');
    var val = document.getElementById('detail-prog-val');
    if (bar) bar.style.width = pct + '%';
    if (val) val.textContent = pct + '%';
    var nav = document.getElementById('nav-prog-' + itemId);
    if (nav) nav.textContent = pct + '%';
}

function updateUIStats() {
    var total = 0, done = 0;
    db.forEach(function(item) {
        var iTotal = 0, iDone = 0;
        item.groups.forEach(function(g, gi) {
            g.tasks.forEach(function(t, ti) {
                total++; iTotal++;
                if (cachedProgress[item.id + '-' + gi + '-' + ti]) { done++; iDone++; }
            });
        });
        // Zaktualizuj procent w sidebarze
        var nav = document.getElementById('nav-prog-' + item.id);
        if (nav) nav.textContent = (iTotal ? Math.round(iDone / iTotal * 100) : 0) + '%';

        // Zaktualizuj ikonę w sidebarze
        if (item.circleVariants) {
            var opacity = getSprawOpacity(item, cachedProgress);
            var variant = getSprawVariant(item, cachedProgress);
            var imgSrc  = getCircleImgForProgress(item, cachedProgress);
            var navEl   = document.getElementById('nav-item-' + item.id);
            if (!navEl) return;
            var navImg  = navEl.querySelector('.nav-circle-img');
            var navEmpty = navEl.querySelector('.nav-circle-empty');
            if (navImg) {
                navImg.style.transition = 'opacity .3s';
                navImg.style.opacity    = opacity;
                if (navImg.getAttribute('data-src') !== imgSrc) {
                    navImg.src = imgSrc;
                    navImg.setAttribute('data-src', imgSrc);
                }
            } else if (navEmpty && variant > 0) {
                var img = document.createElement('img');
                img.className = 'nav-circle-img';
                img.src = imgSrc;
                img.setAttribute('data-src', imgSrc);
                img.style.cssText = 'opacity:' + opacity + ';transition:opacity .3s';
                navEmpty.parentNode.replaceChild(img, navEmpty);
            }
        }
    });
    var pct  = total ? Math.round(done / total * 100) : 0;
    var bar  = document.getElementById('total-bar');
    var prog = document.getElementById('total-progress');
    if (bar)  bar.style.width = pct + '%';
    if (prog) prog.textContent = pct + '%';
}

async function dropToZastep(event, zone) {
    event.preventDefault();
    if (typeof zone === 'object' && zone.classList) zone.classList.remove('drag-over');
    var zastepId = zone && zone.dataset ? zone.dataset.zid : '';
    var userId = event.dataTransfer.getData('userId');
    if (!userId) return;
    await apiFetch('/users/' + userId + '/zastep', {
        method: 'POST',
        body: JSON.stringify({ zastepId: zastepId || null })
    });
    renderZastepyPanel();
}

        alert(r.data.error || 'Blad');

var _pendingRegData = {};

function goToTeamPick() {
    var username  = document.getElementById('regUsername').value.trim().toLowerCase();
    var name      = document.getElementById('regName').value.trim();
    var password  = document.getElementById('regPassword').value;
    var password2 = document.getElementById('regPassword2').value;
    clearMsg('registerMsg');

    if (username.length < 3)             { showMsg('registerMsg', 'Login min. 3 znaki.'); return; }
    if (!/^[a-z0-9_]+$/.test(username)) { showMsg('registerMsg', 'Login: tylko litery, cyfry, _'); return; }
    if (!name)                           { showMsg('registerMsg', 'Wpisz pseudonim.'); return; }
    if (password.length < 6)            { showMsg('registerMsg', 'Haslo min. 6 znakow.'); return; }
    if (password !== password2)         { showMsg('registerMsg', 'Hasla nie sa zgodne.'); return; }

    _pendingRegData = { username, name, password };
    _selectedTeamId = null;

    // Zaladuj druzyny
    apiFetch('/teams').then(function(r) {
        var list = document.getElementById('teamPickList');
        list.innerHTML = '';
        var teams = r.ok ? r.data : [];
        if (!teams.length) {
            list.innerHTML = '<p style="color:var(--muted);font-size:.9rem">Brak druzyn. Skontaktuj sie z administratorem.</p>';
        }
        teams.forEach(function(t) {
            var btn = document.createElement('button');
            btn.className = 'team-pick-btn';
            // Pokaz nazwe druzyny
            btn.textContent = t.name || t.teamId;
            btn.onclick = function() {
                document.querySelectorAll('.team-pick-btn').forEach(function(b){ b.classList.remove('sel'); });
                btn.classList.add('sel');
                // Serwer sprawdza Team.findOne({ teamId }) wiec wysylamy string teamId
                _selectedTeamId = t.teamId;
                document.getElementById('teamPickConfirm').classList.add('show');
            };
            list.appendChild(btn);
        });
        document.getElementById('teamPickConfirm').classList.remove('show');
        document.getElementById('teamPickOverlay').classList.add('active');
    });
}

function backFromTeamPick() {
    document.getElementById('teamPickOverlay').classList.remove('active');
}

async function submitRegisterWithTeam() {
    if (!_selectedTeamId) return;
    var btn = document.getElementById('teamPickConfirm');
    btn.textContent = 'Rejestrowanie...';
    btn.disabled = true;

    var result = await apiFetch('/register', {
        method: 'POST',
        body: JSON.stringify(Object.assign({}, _pendingRegData, { teamId: _selectedTeamId }))
    });

    btn.textContent = 'Zarejestruj sie ✓';

    if (result.ok) {
        document.getElementById('teamPickOverlay').classList.remove('active');

    } else {
        document.getElementById('teamPickOverlay').classList.remove('active');

    }
}

// ══════════════════════════════════════════════════════
// TABLICA SPRAWNOŚCI — circles
// ══════════════════════════════════════════════════════

function getSprawDone(item, progress) {
    // Ile zadań gwiazdkowych zdanych
    var done = 0, total = 0;
    item.groups.forEach(function(g, gi) {
        g.tasks.forEach(function(t, ti) {
            if (!t.match(/^✶/)) return; // tylko gwiazdkowe
            total++;
            if (progress[item.id + '-' + gi + '-' + ti]) done++;
        });
    });
    return { done: done, total: total };
}

function getSprawLevel(item, progress) {
    // Najwyższy zaliczony poziom (gwiazdki) — stara kompatybilność
    var maxLevel = 0;
    item.groups.forEach(function(g, gi) {
        g.tasks.forEach(function(t, ti) {
            if (!progress[item.id + '-' + gi + '-' + ti]) return;
            var stars = (t.match(/^✶+/) || [''])[0].length;
            if (stars > maxLevel) maxLevel = stars;
        });
    });
    return maxLevel;
}

function getSprawVariant(item, progress) {
    // Numer wariantu zdjęcia (1-based) wg logiki:
    // variant = CEIL( done / total * variants )
    if (!item.circleVariants) return 0;
    var s = getSprawDone(item, progress);
    if (s.total === 0 || s.done === 0) return 0;
    return Math.ceil(s.done / s.total * item.circleVariants);
}

function getSprawOpacity(item, progress) {
    // opacity = 0.15 + (done/total) * 0.85
    // Minimum 0.15 (zawsze lekko widoczna), max 1.0
    var s = getSprawDone(item, progress);
    if (s.total === 0) return 0.15;
    return Math.round((0.15 + (s.done / s.total) * 0.85) * 100) / 100;
}

function getCircleImg(item, level) {
    // Stara kompatybilność — użyj variant zamiast level
    var variant = getSprawVariant(item, cachedProgress);
    if (!variant || !item.circleVariants) return null;
    return 'circles/' + item.id + '_' + variant + '.png';
}

function getCircleImgForProgress(item, progress) {
    var variant = getSprawVariant(item, progress);
    if (!item.circleVariants) return null;
    // Jeśli nic nie zdane — pokaż wariant 1 ale z niską opacity
    var v = variant || 1;
    return 'circles/' + item.id + '_' + v + '.png';
}


// ══════════════════════════════════════════════════════
// TABLICA SPRAWNOŚCI (12 slotów)
// ══════════════════════════════════════════════════════

var _boardSlots = Array(12).fill(null); // { sprawnoscId, level, variantIdx }
var _boardLoaded = false;
var _boardPickingSlot = null; // który slot wypełniamy

async function showBoardTab() {
    bnavSetActive('board');
    _boardLoaded = false;
    document.getElementById('contentArea').innerHTML =
        '<div class="welcome-header"><p style="color:var(--muted)">Ladowanie tablicy...</p></div>';

    // Pobierz tablicę z serwera
    var r = await apiFetch('/board/' + (window._currentViewUserId || currentUser.id));
    _boardSlots = r.ok ? r.data : Array(12).fill(null);
    if (!Array.isArray(_boardSlots)) _boardSlots = Array(12).fill(null);
    while (_boardSlots.length < 12) _boardSlots.push(null);

    renderBoard();
}

function renderBoard() {
    var isOwn = (!window._currentViewUserId || window._currentViewUserId === currentUser.id);
    var html = '<div class="board-header">'
        + '<h2 style="font-family:var(--ff-display)">Tablica Sprawnosci</h2>'
        + (isOwn ? '<p style="color:var(--muted);font-size:.85rem">Kliknij pusty slot aby dodac sprawnosc</p>' : '')
        + '</div>';

    html += '<div class="board-grid">';
    for (var i = 0; i < 12; i++) {
        var slot = _boardSlots[i];
        if (slot && slot.sprawnoscId) {
            var item = db.find(function(x){ return x.id === slot.sprawnoscId; });
            var imgSrc = getCircleImg(item || { id: slot.sprawnoscId, circleVariants: slot.level }, slot.level);
            html += '<div class="board-slot board-slot-filled" data-pos="' + i + '" onclick="' + (isOwn ? 'boardSlotClick(' + i + ')' : '') + '">'
                + '<img src="' + (imgSrc || '') + '" class="board-slot-img">'
                + '<div class="board-slot-stars">' + '★'.repeat(slot.level) + '</div>'
                + '<div class="board-slot-name">' + (item ? item.title : slot.sprawnoscId) + '</div>'
                + '</div>';
        } else {
            html += '<div class="board-slot board-slot-empty" data-pos="' + i + '" onclick="' + (isOwn ? 'boardSlotClick(' + i + ')' : '') + '">'
                + '<div class="board-slot-plus">+</div>'
                + '</div>';
        }
    }
    html += '</div>';

    document.getElementById('contentArea').innerHTML = html;
}

function boardSlotClick(pos) {
    var slot = _boardSlots[pos];
    if (slot && slot.sprawnoscId) {
        // Slot zajęty — opcja usunięcia
        if (confirm('Usunac ' + slot.sprawnoscId + ' z tablicy?')) {
            _boardSlots[pos] = null;
            saveBoardSlot(pos, null);
            renderBoard();
        }
    } else {
        // Pusty slot — otwórz picker sprawności
        _boardPickingSlot = pos;
        openBoardPicker();
    }
}

function openBoardPicker() {
    // Zbierz zdane sprawnosci z postępów
    var zdane = db.filter(function(item) {
        if (!item.circleVariants) return false;
        var level = getSprawLevel(item, cachedProgress);
        return level > 0;
    });

    if (!zdane.length) {
        alert('Nie masz jeszcze zadnych zdanych sprawnosci!');
        return;
    }

    var alreadyOnBoard = _boardSlots
        .filter(Boolean)
        .map(function(s){ return s.sprawnoscId; });

    var html = '<div style="background:var(--panel);padding:24px;border-radius:20px;'
        + 'max-width:380px;width:100%;max-height:75vh;overflow-y:auto;position:relative">'
        + '<span onclick="closeBoardPicker()" style="position:absolute;top:12px;right:16px;font-size:20px;cursor:pointer;color:var(--muted)">&times;</span>'
        + '<h3 style="font-family:var(--ff-display);margin-bottom:4px">Wybierz sprawnosc</h3>'
        + '<p style="color:var(--muted);font-size:.82rem;margin-bottom:16px">Tylko zdane sprawnosci</p>'
        + '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">';

    zdane.forEach(function(item) {
        var level = getSprawLevel(item, cachedProgress);
        var imgSrc = getCircleImg(item, level);
        var onBoard = alreadyOnBoard.indexOf(item.id) >= 0;
        html += '<div class="board-picker-item' + (onBoard ? ' on-board' : '') + '" '
            + 'data-id="' + item.id + '" data-level="' + level + '" '
            + 'onclick="' + (onBoard ? '' : 'pickBoardSprawnosc(this.dataset.id,parseInt(this.dataset.level))') + '" '
            + 'title="' + item.title + (onBoard ? ' (już na tablicy)' : '') + '">'
            + '<img src="' + imgSrc + '" style="width:100%;border-radius:50%">'
            + '<div style="font-size:.6rem;text-align:center;margin-top:4px;color:' + (onBoard ? 'var(--muted)' : 'var(--text)') + ';overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'
            + item.title.split('/')[0].trim()
            + '</div>'
            + '<div style="text-align:center;font-size:.65rem;color:var(--amber)">' + '★'.repeat(level) + '</div>'
            + '</div>';
    });

    html += '</div></div>';

    var overlay = document.getElementById('boardPickerOverlay');
    overlay.innerHTML = html;
    overlay.style.display = 'flex';
}

function closeBoardPicker() {
    document.getElementById('boardPickerOverlay').style.display = 'none';
}

async function pickBoardSprawnosc(sprawnoscId, level) {
    closeBoardPicker();
    _boardSlots[_boardPickingSlot] = { sprawnoscId, level, variantIdx: level };
    await saveBoardSlot(_boardPickingSlot, { sprawnoscId, level, variantIdx: level });
    renderBoard();
}

async function saveBoardSlot(pos, data) {
    await apiFetch('/board/' + currentUser.id, {
        method: 'POST',
        body: JSON.stringify({ position: pos, slot: data })
    });
}

// ══════════════════════════════════════════════════════
// PICKER OSOBY w widoku sprawnosci
// ══════════════════════════════════════════════════════
var _memberPickerLoaded = false;

function toggleMemberPicker() {
    var dd = document.getElementById('memberPickerDropdown');
    if (!dd) return;
    if (dd.style.display === 'none') {
        dd.style.display = 'block';
        if (!_memberPickerLoaded) {
            _memberPickerLoaded = true;
            loadMemberPickerList();
        }
    } else {
        dd.style.display = 'none';
    }
}

// Zamknij picker kliknięciem poza nim
document.addEventListener('click', function(e) {
    if (!e.target.closest('#memberPickBtn') && !e.target.closest('#memberPickerDropdown')) {
        var dd = document.getElementById('memberPickerDropdown');
        if (dd) dd.style.display = 'none';
    }
});

async function loadMemberPickerList() {
    var dd = document.getElementById('memberPickerDropdown');
    if (!dd) return;
    dd.innerHTML = '<div style="padding:12px;color:var(--muted);font-size:.85rem">Ladowanie...</div>';

    var r = await apiFetch('/team-members');
    if (!r.ok) { dd.innerHTML = '<div style="padding:12px;color:#c33;font-size:.85rem">Blad ladowania.</div>'; return; }

    var role   = currentUser.role;
    var myRank = rankIndex(role);
    var members = r.data.filter(function(u) {
        return u.status === 'active' && u._id !== currentUser.id
            && (role === 'superadmin' || rankIndex(u.role) > myRank);
    });

    if (!members.length) {
        dd.innerHTML = '<div style="padding:12px;color:var(--muted);font-size:.85rem">Brak osob do wybrania.</div>';
        return;
    }

    // Własne sprawnosci na górze
    var selfHtml = '<div onclick="pickMember(null)" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);'
        + 'font-size:.88rem;font-weight:600;color:var(--f4);display:flex;align-items:center;gap:8px;">'
        + '&#128100; Moje sprawnosci</div>';

    var listHtml = members.map(function(u) {
        var rColor = ROLE_COLORS[u.role] || '#546e7a';
        var rLabel = ROLE_LABELS[u.role] || u.role;
        return '<div onclick="pickMember(\'' + u._id + '\',\'' + u.name.replace(/'/g,"\'") + '\',\'' + u.role + '\')" '
            + 'style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);'
            + 'font-size:.88rem;display:flex;align-items:center;gap:8px;" '
            + 'class="member-picker-item">'
            + '<span>&#128100;</span>'
            + '<span style="flex:1">' + u.name + '</span>'
            + '<span style="font-size:.7rem;padding:2px 7px;border-radius:20px;background:var(--panel2);color:' + rColor + ';font-weight:700">' + rLabel + '</span>'
            + '</div>';
    }).join('');

    dd.innerHTML = selfHtml + listHtml;
}

async function pickMember(userId, userName, userRole) {
    _memberPickerLoaded = false;
    var dd = document.getElementById('memberPickerDropdown');
    if (dd) dd.style.display = 'none';

    if (!userId) {
        currentViewUserId           = currentUser.id;
        window._currentViewUserRole = currentUser.role;
        window._currentViewUserName = currentUser.name;
    } else {
        currentViewUserId           = userId;
        window._currentViewUserRole = userRole || 'user';
        window._currentViewUserName = userName || '';
    }

    // Załaduj progress wybranej osoby
    var uid = userId || currentUser.id;
    var r = await apiFetch('/progress/' + uid);
    cachedProgress = (r.ok && r.data) ? r.data : {};

    // Zapisz w localStorage jeśli to własny progress
    if (!userId || userId === currentUser.id) {
        try { localStorage.setItem('hk_progress', JSON.stringify(cachedProgress)); } catch(e) {}
    }

    // Odśwież sidebar ikony dla nowej osoby
    renderSidebar();
    updateUIStats();

    // Odśwież aktywny widok
    var activeNav = document.querySelector('.nav-item.active');
    if (activeNav) {
        var id = activeNav.id.replace('nav-item-','');
        if (id) loadContent(id);
    }

    // Zaktualizuj przycisk
    var btn = document.getElementById('memberPickBtn');
    if (btn) {
        btn.innerHTML = '&#128101; ' + (userName || currentUser.name)
            + '<span style="font-size:.7rem;color:var(--muted)">&#9660;</span>';
    }
}

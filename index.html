<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ksiazeczka Harcerska – Leśna Szkółka</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
    --f9:#0d1f14; --f8:#1a3424; --f7:#243d2b; --f6:#2d5016; --f5:#3a6b1e;
    --f4:#4e8a2a; --f3:#6aaa3d; --f2:#a8d080; --f1:#d4eab8; --f0:#f0f7e6;
    --amber:#c97d1a; --amber2:#e89830;
    --bg:#f6f8f2; --panel:#ffffff; --panel2:#f0f4eb;
    --text:#1a2e1d; --muted:#6b7c6e; --border:#dde8d0;
    --shadow:0 2px 16px rgba(13,31,20,0.07); --shadow-lg:0 8px 40px rgba(13,31,20,0.12);
    --r:12px; --rs:8px;
    --sidebar-w:280px;
    --nav-h:64px;
}
body.dark {
    --bg:#111a12; --panel:#192219; --panel2:#1e2e1f;
    --text:#ddebd0; --muted:#7a9c7e; --border:#253525;
    --shadow:0 2px 16px rgba(0,0,0,0.3); --shadow-lg:0 8px 40px rgba(0,0,0,0.4);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* ── LOGIN OVERLAY ── */
#loginOverlay{position:fixed;inset:0;background:linear-gradient(160deg,var(--f9) 0%,var(--f7) 50%,var(--f6) 100%);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px;}
.login-box{background:rgba(255,255,255,0.97);border-radius:20px;padding:48px 40px;width:100%;max-width:380px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,0.35);}
body.dark .login-box{background:rgba(25,34,25,0.97);}
.login-box h2{font-family:'Playfair Display',serif;font-size:2rem;color:var(--f8);margin-bottom:28px;text-align:center;}
body.dark .login-box h2{color:var(--f2);}
.login-box input,.login-box select{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.95rem;outline:none;transition:.2s;margin-bottom:10px;display:block;}
.login-box input:focus,.login-box select:focus{border-color:var(--f4);}
.btn-main{width:100%;padding:14px;background:linear-gradient(135deg,var(--f5),var(--f4));border:none;border-radius:var(--rs);color:#fff;font-weight:600;font-size:1rem;cursor:pointer;transition:.2s;margin-top:4px;}
.btn-main:hover{opacity:.9;transform:translateY(-1px);}
.btn-link{width:100%;padding:11px;background:transparent;border:1.5px solid var(--border);border-radius:var(--rs);color:var(--muted);font-size:.9rem;cursor:pointer;transition:.2s;margin-top:8px;}
.btn-link:hover{border-color:var(--f4);color:var(--f5);}
.login-msg{font-size:.85em;padding:8px 12px;border-radius:var(--rs);margin-top:8px;display:none;}
.login-msg.error{background:#fee;color:#c33;display:block;}
.login-msg.success{background:#e8f5e9;color:#2e7d32;display:block;}

/* ── LAYOUT ── */
.app-layout{display:flex;height:100vh;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar-w);background:var(--f9);color:#d4eab8;display:flex;flex-direction:column;flex-shrink:0;transition:transform .3s;z-index:100;overflow:hidden;}
.sidebar-header{padding:28px 20px 20px;background:var(--f8);}
.sidebar-header h1{font-family:'Playfair Display',serif;font-size:1.25rem;color:#e8f5d0;letter-spacing:.5px;cursor:pointer;margin-bottom:4px;}
.sidebar-header small{font-size:.75rem;color:#8ab87a;cursor:pointer;}
.sidebar-search{padding:14px 16px;}
.sidebar-search input{width:100%;padding:10px 14px;border-radius:30px;border:none;background:rgba(255,255,255,0.08);color:#d4eab8;font-size:.9rem;outline:none;transition:.2s;}
.sidebar-search input::placeholder{color:#6a8a6a;}
.sidebar-search input:focus{background:rgba(255,255,255,0.14);}
.nav-list{flex:1;overflow-y:auto;list-style:none;padding:0 10px 80px;}
.nav-list::-webkit-scrollbar{width:4px}
.nav-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1)}
.nav-category{padding:18px 12px 6px;font-size:.68rem;text-transform:uppercase;letter-spacing:1.5px;color:#5a7a5a;font-weight:600;}
.nav-item{padding:10px 14px;border-radius:var(--rs);cursor:pointer;display:flex;justify-content:space-between;align-items:center;color:#a8c898;font-size:.92rem;transition:.18s;margin-bottom:2px;}
.nav-item:hover{background:rgba(255,255,255,.07);color:#d4eab8;}
.nav-item.active{background:linear-gradient(90deg,var(--f4),var(--f3));color:#fff;font-weight:600;}
.nav-progress{font-size:.7rem;font-weight:700;background:rgba(0,0,0,.2);padding:2px 8px;border-radius:20px;}
.nav-item.active .nav-progress{background:rgba(255,255,255,.2);}

/* ── MAIN ── */
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* ── TOP NAV BAR ── */
.topbar{height:var(--nav-h);background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0;box-shadow:var(--shadow);}
.topbar-title{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--text);flex:1;}
.topbar-btn{width:40px;height:40px;border-radius:10px;border:1.5px solid var(--border);background:var(--panel2);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;font-size:1.1rem;}
.topbar-btn:hover{border-color:var(--f4);color:var(--f5);background:var(--f0);}
body.dark .topbar-btn:hover{background:var(--panel2);}
.hamburger-btn{display:none;width:40px;height:40px;border-radius:10px;border:1.5px solid var(--border);background:var(--panel2);color:var(--muted);align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;}

/* ── CONTENT ── */
.content-scroll{flex:1;overflow-y:auto;padding:32px 28px 60px;}
.content-wrap{max-width:820px;margin:0 auto;}

/* ── HEADER SECTION ── */
.header-section{background:var(--panel);border-radius:var(--r);box-shadow:var(--shadow);padding:28px 28px 24px;margin-bottom:24px;border-left:4px solid var(--amber);}
.cat-badge{display:inline-block;background:var(--f0);color:var(--f5);padding:3px 12px;border-radius:20px;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
body.dark .cat-badge{background:var(--panel2);color:var(--f2);}
.header-section h2{font-family:'Playfair Display',serif;font-size:1.9rem;color:var(--text);margin:6px 0 18px;}
.big-progress-wrapper{background:var(--panel2);height:8px;border-radius:4px;overflow:hidden;}
.big-progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--f5),var(--f3));transition:width .8s cubic-bezier(.34,1.56,.64,1);}
.progress-label{display:flex;justify-content:space-between;font-size:.82rem;color:var(--muted);margin-bottom:6px;}

/* ── TASKS ── */
.task-group{margin-bottom:24px;}
.group-title{font-size:.72rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:700;margin-bottom:12px;padding-left:4px;}
.cb-container{display:flex;align-items:flex-start;gap:14px;background:var(--panel);padding:14px 18px;border-radius:var(--rs);margin-bottom:8px;border:1.5px solid var(--border);cursor:pointer;transition:.18s;}
.cb-container:hover{border-color:var(--f3);box-shadow:var(--shadow);}
.cb-container input{display:none;}
.checkmark{width:22px;height:22px;min-width:22px;border-radius:6px;border:2px solid var(--border);background:var(--panel2);display:flex;align-items:center;justify-content:center;margin-top:1px;transition:.18s;}
.cb-container input:checked ~ .checkmark{background:var(--f4);border-color:var(--f4);}
.checkmark:after{content:"";display:none;width:5px;height:10px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg) translateY(-1px);}
.cb-container input:checked ~ .checkmark:after{display:block;}
.task-text{font-size:.92rem;color:var(--text);line-height:1.5;padding-top:2px;transition:.18s;}
.cb-container input:checked ~ .task-text{color:var(--muted);text-decoration:line-through;}

/* ── HOME ── */
.welcome-header{text-align:center;padding:40px 20px 32px;}
.welcome-header h2{font-family:'Playfair Display',serif;font-size:2.2rem;color:var(--f5);margin-bottom:6px;}
body.dark .welcome-header h2{color:var(--f2);}
.welcome-header p{color:var(--muted);font-size:1rem;}
.home-card{background:var(--panel);border-radius:var(--r);box-shadow:var(--shadow);padding:28px;margin-bottom:20px;border:1px solid var(--border);}
.home-card h3{font-family:'Playfair Display',serif;font-size:1.1rem;margin-bottom:16px;color:var(--text);}

/* ── ADMIN ── */
.member-row{padding:12px 16px;background:var(--panel2);border:1.5px solid var(--border);border-radius:var(--rs);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
.btn-sm{padding:7px 14px;border:none;border-radius:var(--rs);font-weight:600;cursor:pointer;font-size:.8rem;transition:.18s;}
.btn-approve{background:var(--f4);color:#fff;}.btn-approve:hover{background:var(--f5);}
.btn-reject{background:#fee;color:#c33;}.btn-reject:hover{background:#fdd;}
.btn-delete{background:#fee;color:#c33;}.btn-delete:hover{background:#fdd;}
.btn-view{background:var(--panel);color:var(--f5);border:1.5px solid var(--border) !important;}.btn-view:hover{border-color:var(--f4) !important;}
.btn-teams{background:var(--panel);color:var(--text);border:1.5px solid var(--border) !important;}
.status-badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.72rem;font-weight:700;}
.status-active{background:#e8f5e9;color:#2e7d32;}
.status-pending{background:#fff3e0;color:#e65100;}
.status-rejected{background:#ffebee;color:#c62828;}
.input-add{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--panel2);color:var(--text);font-size:.9rem;outline:none;}
.input-add:focus{border-color:var(--f4);}

/* ── SETTINGS MODAL ── */
.settings-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:5000;justify-content:center;align-items:center;backdrop-filter:blur(4px);}
.settings-content{background:var(--panel);padding:32px;border-radius:20px;width:300px;box-shadow:var(--shadow-lg);position:relative;color:var(--text);}
.settings-content h3{font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:20px;color:var(--f5);}
.close-settings{position:absolute;top:14px;right:18px;font-size:22px;cursor:pointer;color:var(--muted);}
.settings-option{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);}
.settings-option span{font-weight:500;font-size:.9rem;}
.switch{position:relative;display:inline-block;width:46px;height:24px;}
.switch input{opacity:0;width:0;height:0;}
.slider{position:absolute;inset:0;background:#ccc;border-radius:34px;cursor:pointer;transition:.3s;}
.slider:before{position:absolute;content:"";height:16px;width:16px;left:4px;bottom:4px;background:#fff;border-radius:50%;transition:.3s;}
input:checked+.slider{background:var(--f4);}
input:checked+.slider:before{transform:translateX(22px);}
.settings-btn-action{width:100%;padding:11px;margin-top:10px;border:none;border-radius:var(--rs);font-weight:600;cursor:pointer;transition:.2s;font-size:.9rem;}
.btn-reset{background:#fee;color:#c33;}
.btn-logout{background:var(--f5);color:#fff;margin-top:6px;}
.btn-logout:hover{background:var(--f6);}

/* ── PHOTO MODAL ── */
#photoModal{display:none;position:fixed;inset:0;z-index:6000;background:rgba(0,0,0,.92);justify-content:center;align-items:center;backdrop-filter:blur(6px);}
#modalImg{max-width:90%;max-height:90%;border-radius:var(--rs);}
#modalImg.zoomed{transform:scale(1.8);cursor:zoom-out;}
.close-modal{position:absolute;top:20px;right:28px;color:#fff;font-size:36px;cursor:pointer;}

/* ── IMAGE GALLERY ── */
.image-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:20px;}
.gallery-img{width:100%;height:140px;object-fit:cover;border-radius:var(--rs);cursor:pointer;transition:.25s;border:2px solid var(--border);}
.gallery-img:hover{transform:scale(1.04);}

/* ── MOBILE ── */
@media(max-width:768px){
    .sidebar{position:fixed;height:100%;transform:translateX(-110%);}
    .sidebar.open{transform:translateX(0);}
    .hamburger-btn{display:flex;}
    .content-scroll{padding:20px 16px 60px;}
    .header-section{padding:20px;}
    .header-section h2{font-size:1.5rem;}
    .welcome-header{padding:28px 16px 20px;}
    .welcome-header h2{font-size:1.7rem;}
    .home-card{padding:20px;}
    .topbar{padding:0 16px;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginOverlay">
    <div class="login-box" id="panelLogin">
        <h2>Czuwaj!</h2>
        <input type="text" id="loginUsername" placeholder="Login" onkeydown="if(event.key==='Enter')handleLogin()">
        <input type="password" id="loginPassword" placeholder="Hasło" onkeydown="if(event.key==='Enter')handleLogin()">
        <button class="btn-main" onclick="handleLogin()">Zaloguj się</button>
        <button class="btn-link" onclick="showPanel('register')">Nie masz konta? Zarejestruj się</button>
        <p class="login-msg" id="loginMsg"></p>
    </div>
    <div class="login-box" id="panelRegister" style="display:none;">
        <h2>Dołącz!</h2>
        <input type="text" id="regUsername" placeholder="Login (min. 3 znaki)">
        <input type="text" id="regName" placeholder="Pseudonim / Imię">
        <input type="password" id="regPassword" placeholder="Hasło (min. 6 znaków)">
        <input type="password" id="regPassword2" placeholder="Powtórz hasło">
        <select id="regTeam"><option value="">— Wybierz drużynę —</option></select>
        <button class="btn-main" onclick="handleRegister()">Zarejestruj się</button>
        <button class="btn-link" onclick="showPanel('login')">Masz konto? Zaloguj się</button>
        <p class="login-msg" id="registerMsg"></p>
    </div>
</div>

<!-- SETTINGS MODAL -->
<div id="settingsModal" class="settings-modal" onclick="closeSettings(event)">
    <div class="settings-content">
        <span class="close-settings" onclick="toggleSettingsModal(false)">&times;</span>
        <h3>Ustawienia</h3>
        <div class="settings-option">
            <span>Tryb ciemny</span>
            <label class="switch"><input type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()"><span class="slider"></span></label>
        </div>
        <div class="settings-option">
            <span>Duży tekst</span>
            <label class="switch"><input type="checkbox" id="textSizeToggle" onchange="toggleTextSize()"><span class="slider"></span></label>
        </div>
        <hr style="border:0;border-top:1px solid var(--border);margin:18px 0;">
        <button class="settings-btn-action btn-reset" onclick="resetProgress()">⚠️ Zresetuj progres</button>
        <button class="settings-btn-action btn-logout" onclick="handleLogout()">Wyloguj się</button>
    </div>
</div>

<!-- PHOTO MODAL -->
<div id="photoModal" onclick="closeModal()">
    <span class="close-modal">&times;</span>
    <img id="modalImg" src="" alt="" onclick="toggleZoom(event)">
</div>

<!-- APP -->
<div class="app-layout">

    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1 onclick="goHome()">LEŚNA SZKÓŁKA</h1>
            <small onclick="goHome()">Książeczka Harcerska</small>
        </div>
        <div class="sidebar-search">
            <input type="text" id="searchInput" placeholder="🔍 Szukaj stopnia lub sprawności..." onkeyup="filterNav()">
        </div>
        <ul class="nav-list" id="navList"></ul>
    </nav>

    <!-- MAIN -->
    <div class="main-area">
        <!-- TOP BAR -->
        <div class="topbar">
            <button class="hamburger-btn" onclick="toggleSidebar()">☰</button>
            <div class="topbar-title" id="topbarTitle">Książeczka Harcerska</div>
            <button class="topbar-btn" title="Książeczka" onclick="goHome()">📖</button>
            <button class="topbar-btn" title="Ustawienia" onclick="openSettings()">⚙️</button>
        </div>
        <!-- CONTENT -->
        <div class="content-scroll">
            <div class="content-wrap" id="contentArea"></div>
        </div>
    </div>

</div>

<script src="stopnie.js"></script>
<script src="sprawnosci.js"></script>
<script>
// ================================================================
// KONFIGURACJA
// ================================================================
const API = 'https://harcerze-backend.onrender.com/api';

// ================================================================
// HIERARCHIA RAN
// ================================================================
var HIERARCHY = ['superadmin','ksis','instruktor','druzynowy','zastepowy','podzastepowy','user'];
var ROLE_LABELS = {
    'superadmin':  '&#128081; Super Admin',
    'ksis':        '&#11088; Ksis',
    'instruktor':  '&#127775; Instruktor',
    'druzynowy':   '&#128210; Druzynowy',
    'zastepowy':   '&#128203; Zastepowy',
    'podzastepowy':'&#128196; Podzastepowy',
    'user':        '&#128100; Harcerz'
};
var ROLE_COLORS = {
    'superadmin': '#7b1fa2',
    'ksis':       '#c62828',
    'instruktor': '#e65100',
    'druzynowy':  '#1565c0',
    'zastepowy':    '#2e7d32',
    'podzastepowy': '#558b2f',
    'user':         '#546e7a'
};
function rankIndex(role) {
    var i = HIERARCHY.indexOf(role);
    return i === -1 ? 999 : i;
}
function canManage(myRole, targetRole) {
    return myRole === 'superadmin' || rankIndex(myRole) < rankIndex(targetRole);
}
function availableRoles(myRole) {
    if (myRole === 'superadmin') return ['ksis','instruktor','druzynowy','zastepowy','podzastepowy','user'];
    if (myRole === 'druzynowy')  return ['zastepowy','podzastepowy','user'];
    return [];
}

// ================================================================
// ZMIENNE GLOBALNE
// ================================================================
let db = [];
let currentUser       = null;
let authToken         = null;
let currentViewUserId   = null;
let currentViewUserRole = 'user';
let cachedProgress    = {};

// ================================================================
// INICJALIZACJA
// ================================================================
window.onload = async () => {
    loadSettings();
    db = [
        ...(typeof stopnieData    !== 'undefined' ? stopnieData    : []),
        ...(typeof sprawnosciData !== 'undefined' ? sprawnosciData : [])
    ];

    const savedToken = sessionStorage.getItem('hk_token');
    const savedUser  = sessionStorage.getItem('hk_user');
    if (savedToken && savedUser) {
        authToken   = savedToken;
        currentUser = JSON.parse(savedUser);
        initAppAfterLogin();
    } else {
        await loadTeams();
        showPanel('login');
    }
};

// ================================================================
// PANELE LOGOWANIA
// ================================================================
function showPanel(name) {
    document.getElementById('loginOverlay').style.display = 'flex';
    document.getElementById('panelLogin').style.display    = name === 'login'    ? 'block' : 'none';
    document.getElementById('panelRegister').style.display = name === 'register' ? 'block' : 'none';
    clearMsg('loginMsg');
    clearMsg('registerMsg');
}
function showMsg(id, text, type) {
    var el = document.getElementById(id);
    if (!el) return;
    el.textContent = text;
    el.className = 'login-msg ' + (type || 'error');
}
function clearMsg(id) {
    var el = document.getElementById(id);
    if (el) { el.textContent = ''; el.className = 'login-msg'; }
}

// ================================================================
// FETCH Z TOKENEM JWT
// ================================================================
async function apiFetch(url, options) {
    options = options || {};
    var headers = { 'Content-Type': 'application/json' };
    if (options.headers) Object.assign(headers, options.headers);
    if (authToken) headers['Authorization'] = 'Bearer ' + authToken;
    try {
        var res  = await fetch(API + url, Object.assign({}, options, { headers: headers }));
        var data = await res.json();
        return { ok: res.ok, status: res.status, data: data };
    } catch (e) {
        return { ok: false, status: 0, data: { error: 'Blad polaczenia z serwerem' } };
    }
}

// ================================================================
// LADOWANIE DRUZYN DO SELECTA
// ================================================================
async function loadTeams() {
    var result = await apiFetch('/teams');
    if (!result.ok) return;
    var select = document.getElementById('regTeam');
    select.innerHTML = '<option value="">-- Wybierz druzyne --</option>';
    result.data.forEach(function(t) {
        var opt = document.createElement('option');
        opt.value = t.teamId;
        opt.textContent = t.name;
        select.appendChild(opt);
    });
}

// ================================================================
// LOGOWANIE
// ================================================================
async function handleLogin() {
    var username = document.getElementById('loginUsername').value.trim();
    var password = document.getElementById('loginPassword').value;
    clearMsg('loginMsg');
    if (!username || !password) { showMsg('loginMsg', 'Podaj login i haslo.'); return; }

    var result = await apiFetch('/login', { method: 'POST', body: JSON.stringify({ username: username, password: password }) });
    if (!result.ok) { showMsg('loginMsg', result.data.message || 'Blad logowania.'); return; }

    authToken   = result.data.token;
    currentUser = result.data.user;
    sessionStorage.setItem('hk_token', authToken);
    sessionStorage.setItem('hk_user',  JSON.stringify(currentUser));
    document.getElementById('loginOverlay').style.display = 'none';
    initAppAfterLogin();
}

// ================================================================
// REJESTRACJA
// ================================================================
async function handleRegister() {
    var username  = document.getElementById('regUsername').value.trim().toLowerCase();
    var name      = document.getElementById('regName').value.trim();
    var password  = document.getElementById('regPassword').value;
    var password2 = document.getElementById('regPassword2').value;
    var teamId    = document.getElementById('regTeam').value;
    clearMsg('registerMsg');

    if (username.length < 3)              { showMsg('registerMsg', 'Login min. 3 znaki.'); return; }
    if (!/^[a-z0-9_]+$/.test(username))  { showMsg('registerMsg', 'Login: tylko litery, cyfry, _'); return; }
    if (!name)                            { showMsg('registerMsg', 'Wpisz pseudonim.'); return; }
    if (password.length < 6)             { showMsg('registerMsg', 'Haslo min. 6 znakow.'); return; }
    if (password !== password2)           { showMsg('registerMsg', 'Hasla nie sa identyczne.'); return; }
    if (!teamId)                          { showMsg('registerMsg', 'Wybierz druzyne.'); return; }

    var result = await apiFetch('/register', { method: 'POST', body: JSON.stringify({ username: username, password: password, name: name, teamId: teamId }) });
    if (!result.ok) { showMsg('registerMsg', result.data.message || 'Blad rejestracji.'); return; }

    ['regUsername','regName','regPassword','regPassword2'].forEach(function(id) { document.getElementById(id).value = ''; });
    document.getElementById('regTeam').value = '';
    showMsg('registerMsg', result.data.message, 'success');
}

// ================================================================
// WYLOGOWANIE
// ================================================================
function handleLogout() {
    authToken = null; currentUser = null; currentViewUserId = null; currentViewUserRole = 'user'; cachedProgress = {};
    sessionStorage.removeItem('hk_token');
    sessionStorage.removeItem('hk_user');
    toggleSettingsModal(false);
    document.getElementById('navList').innerHTML = '';
    document.getElementById('contentArea').innerHTML = '';
    loadTeams().then(function() { showPanel('login'); });
}

// ================================================================
// INICJALIZACJA PO ZALOGOWANIU
// ================================================================
function initAppAfterLogin() {
    currentViewUserId = currentUser.id;
    if (currentUser.role !== 'user') {
        renderAdminDashboard();
    } else {
        apiFetch('/progress/' + currentUser.id).then(function(r) {
            cachedProgress = r.ok ? r.data : {};
            goHome();
            renderSidebar();
        });
        // Pobierz nazwe druzyny i pokaz w sidebarze
        apiFetch('/my-team').then(function(r) {
            if (r.ok && r.data.teamName) {
                var brand = document.querySelector('.brand small');
                if (brand) brand.textContent = r.data.teamName;
            }
        });
    }
}

// ================================================================
// TOGGLE ZADANIA
// ================================================================
async function toggleTask(taskId, itemId) {
    var myRank     = rankIndex(currentUser.role);
    var targetRank = rankIndex(currentViewUserRole || 'user');
    var canToggle  = currentUser.role === 'superadmin' || myRank < targetRank;
    if (!canToggle) {
        alert('Nie mozesz zatwierdzac sprawnosci tej osoby!');
        document.querySelectorAll('.cb-container input').forEach(function(inp) {
            if (inp.dataset.tid === taskId) inp.checked = !!cachedProgress[taskId];
        });
        return;
    }
    var isChecked = !cachedProgress[taskId];
    if (isChecked) cachedProgress[taskId] = true;
    else           delete cachedProgress[taskId];
    updateItemProgress(itemId);
    updateUIStats();

    var result = await apiFetch('/progress', { method: 'POST', body: JSON.stringify({ userId: currentViewUserId, taskId: taskId, status: isChecked }) });
    if (!result.ok) {
        if (isChecked) delete cachedProgress[taskId];
        else           cachedProgress[taskId] = true;
        updateItemProgress(itemId);
        alert('Blad zapisu!');
    }
}

// ================================================================
// PANEL ADMINA — lista harcerzy
// ================================================================
async function renderAdminDashboard() {
    document.getElementById('navList').innerHTML = '';
    document.getElementById('contentArea').innerHTML = '<div class="welcome-header"><p>Ladowanie...</p></div>';

    var result = await apiFetch('/team-members');
    if (!result.ok) {
        document.getElementById('contentArea').innerHTML = '<div class="welcome-header"><p style="color:#c33">Blad polaczenia z serwerem.</p></div>';
        return;
    }

    var members = result.data;
    var pending  = members.filter(function(u){return u.status==='pending';});
    var active   = members.filter(function(u){return u.status==='active';});
    var rejected = members.filter(function(u){return u.status==='rejected';});
    var role     = currentUser.role;
    var myRank   = rankIndex(role);

    var panelTitle = {
        'superadmin': '&#128081; Super Administrator',
        'ksis':       '&#11088; Panel Ksiecia/Ksis',
        'instruktor': '&#127775; Panel Instruktora',
        'druzynowy':  '&#128210; Panel Druzynowego',
        'zastepowy':  '&#128203; Panel Zastepowego',
        'podzastepowy': '&#128196; Panel Podzastepowego'
    }[role] || 'Panel';

    var html = '<div class="welcome-header">'
        + '<h2>Czuwaj, ' + currentUser.name + '!</h2>'
        + '<p>' + panelTitle + '</p>'
        + (role === 'superadmin' ? '<button onclick="renderTeamsPanel()" style="margin-top:12px;padding:10px 20px;background:var(--amber);border:none;border-radius:var(--rs);color:#fff;font-weight:600;cursor:pointer;">&#9881; Zarzadzaj druzynami</button>' : '')
        + '</div>';

    // OCZEKUJACE — tylko druzynowy i superadmin
    if ((role === 'superadmin' || role === 'druzynowy') && pending.length > 0) {
        html += '<div class="home-card" style="border-left:4px solid var(--amber);">'
            + '<h3 style="color:var(--amber)">&#8987; Oczekujace prosby (' + pending.length + ')</h3>'
            + '<div style="display:grid;gap:10px;">';
        pending.forEach(function(u) {
            html += '<div class="member-row">'
                + '<div><strong>' + u.name + '</strong><span style="color:var(--muted);font-size:.85em;margin-left:8px;">@' + u.username + '</span></div>'
                + '<div style="display:flex;gap:8px;">'
                + '<button class="btn-sm btn-approve" onclick="approveUser(\'' + u._id + '\')">&#10003; Akceptuj</button>'
                + '<button class="btn-sm btn-reject"  onclick="rejectUser(\'' + u._id + '\')">&#10007; Odrzuc</button>'
                + '</div></div>';
        });
        html += '</div></div>';
    }

    // AKTYWNI
    html += '<div class="home-card"><h3>Aktywni harcerze (' + active.length + ')</h3><div style="display:grid;gap:10px;">';
    if (active.length === 0) {
        html += '<p style="color:var(--muted);text-align:center">Brak aktywnych harcerzy.</p>';
    } else {
        active.forEach(function(u) {
            var esc     = u.name.replace(/'/g, "\'");
            var uRank   = rankIndex(u.role);
            var isLower = role === 'superadmin' || myRank < uRank;
            var rColor  = ROLE_COLORS[u.role] || '#546e7a';
            var rLabel  = ROLE_LABELS[u.role] || u.role;
            var canSpraw = isLower;
            var canDel   = (role === 'superadmin');
            var canRole  = isLower && (role === 'superadmin' || role === 'druzynowy');

            var dropdown = '';
            if (canRole) {
                var av = availableRoles(role);
                var opts = '<option value="">-- Zmien range --</option>';
                av.forEach(function(r) {
                    opts += '<option value="' + r + '"' + (r === u.role ? ' selected' : '') + '>' + (ROLE_LABELS[r] || r) + '</option>';
                });
                dropdown = '<select class="btn-sm" style="background:#e3f2fd;color:#1565c0;border:1.5px solid #90caf9;border-radius:var(--rs);padding:6px 10px;font-weight:600;cursor:pointer;" data-uid="' + u._id + '" data-uname="' + esc + '" onchange="promoteUser(this.dataset.uid,this.dataset.uname,this.value,this)">' + opts + '</select>';
            }

            html += '<div class="member-row">'
                + '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">'
                + '<strong>' + u.name + '</strong>'
                + '<span style="color:var(--muted);font-size:.85em;">@' + u.username + '</span>'
                + '<span class="status-badge status-active">aktywny</span>'
                + '<span style="font-size:.72rem;padding:2px 8px;border-radius:20px;background:var(--panel2);color:' + rColor + ';font-weight:700;">' + rLabel + '</span>'
                + '</div>'
                + '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">'
                + dropdown
                + (canSpraw ? '<button class="btn-sm btn-view" onclick="switchToUser(\'' + u._id + '\',\'' + esc + '\',\'' + u.role + '\')">&#128203; Sprawnosci</button>' : '')
                + (canDel   ? '<button class="btn-sm btn-delete" onclick="deleteUser(\'' + u._id + '\',\'' + esc + '\')">&#128465; Usun</button>' : '')
                + '</div></div>';
        });
    }
    html += '</div></div>';

    // ODRZUCENI — tylko superadmin
    if (role === 'superadmin' && rejected.length > 0) {
        html += '<div class="home-card" style="opacity:.7"><h3 style="color:var(--muted)">Odrzucone konta (' + rejected.length + ')</h3><div style="display:grid;gap:10px;">';
        rejected.forEach(function(u) {
            var esc = u.name.replace(/'/g, "\'");
            html += '<div class="member-row">'
                + '<div><strong>' + u.name + '</strong><span style="color:var(--muted);font-size:.85em;margin-left:8px;">@' + u.username + '</span>'
                + '<span class="status-badge status-rejected" style="margin-left:6px;">odrzucony</span></div>'
                + '<button class="btn-sm btn-delete" onclick="deleteUser(\'' + u._id + '\',\'' + esc + '\')">&#128465; Usun</button>'
                + '</div>';
        });
        html += '</div></div>';
    }

    document.getElementById('contentArea').innerHTML = html;
}

// ================================================================
// PANEL DRUZYN (tylko superadmin)
// ================================================================
async function renderTeamsPanel() {
    document.getElementById('navList').innerHTML = '';
    document.getElementById('contentArea').innerHTML = '<div class="welcome-header"><p>Ladowanie...</p></div>';

    var result = await apiFetch('/teams');
    if (!result.ok) { document.getElementById('contentArea').innerHTML = '<p style="color:red">Blad.</p>'; return; }

    var teams = result.data;
    var html = '<div class="welcome-header"><h2>Druzyny</h2><p>Zarzadzaj listą druzyn</p>'
        + '<button onclick="renderAdminDashboard()" style="background:var(--primary);border:none;color:white;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:0.9rem;margin-top:8px;">&#8592; Wróc do harcerzy</button>'
        + '</div>';

    // FORMULARZ DODAWANIA
    html += '<div class="home-card">'
        + '<h3 style="margin-top:0;">Dodaj nowa druzyne</h3>'
        + '<div style="display:flex;gap:10px;">'
        + '<input type="text" id="newTeamName" class="input-add" placeholder="Nazwa druzyny (np. 6 Druzyna Harcerska)" onkeydown="if(event.key===\'Enter\')addTeam()">'
        + '<button class="btn-sm btn-approve" onclick="addTeam()" style="white-space:nowrap;">+ Dodaj</button>'
        + '</div>'
        + '<p id="teamMsg" style="margin:8px 0 0;font-size:0.88em;display:none;"></p>'
        + '</div>';

    // LISTA DRUZYN
    html += '<div class="home-card"><h3 style="margin-top:0;">Istniejace druzyny (' + teams.length + ')</h3><div style="display:grid;gap:10px;">';
    teams.forEach(function(t) {
        var escName = t.name.replace(/'/g, "\\'");
        var escId   = t.teamId.replace(/'/g, "\\'");
        html += '<div class="member-row">'
            + '<div>'
            + '<strong>' + t.name + '</strong>'
            + '<span style="color:var(--text-muted);font-size:0.8em;margin-left:8px;">ID: ' + t.teamId + '</span>'
            + '</div>'
            + '<button class="btn-sm btn-delete" onclick="deleteTeam(\'' + escId + '\',\'' + escName + '\')">&#128465; Usun</button>'
            + '</div>';
    });
    if (teams.length === 0) html += '<p style="color:var(--text-muted);text-align:center;">Brak druzyn.</p>';
    html += '</div></div>';

    document.getElementById('contentArea').innerHTML = html;
}

async function addTeam() {
    var name = document.getElementById('newTeamName').value.trim();
    var msg  = document.getElementById('teamMsg');
    if (!name) { showTeamMsg('Wpisz nazwe druzyny.', 'error'); return; }

    var result = await apiFetch('/teams', { method: 'POST', body: JSON.stringify({ name: name }) });
    if (result.ok) {
        document.getElementById('newTeamName').value = '';
        renderTeamsPanel();
    } else {
        showTeamMsg(result.data.message || 'Blad.', 'error');
    }
}

function showTeamMsg(text, type) {
    var el = document.getElementById('teamMsg');
    if (!el) return;
    el.textContent = text;
    el.style.color  = type === 'error' ? '#d32f2f' : '#2e7d32';
    el.style.display = 'block';
}

async function deleteTeam(teamId, teamName) {
    if (!confirm('Usunac druzyne "' + teamName + '"?\nUSUNIE TEZ wszystkich jej czlonkow i postepy!')) return;
    var result = await apiFetch('/teams/' + teamId, { method: 'DELETE' });
    result.ok ? renderTeamsPanel() : alert(result.data.error || 'Blad.');
}

// ================================================================
// AKCJE NA UZYTKOWNIKACH
// ================================================================
async function approveUser(id) {
    var r = await apiFetch('/users/' + id + '/approve', { method: 'POST' });
    r.ok ? renderAdminDashboard() : alert(r.data.error || 'Blad.');
}
async function rejectUser(id) {
    var r = await apiFetch('/users/' + id + '/reject', { method: 'POST' });
    r.ok ? renderAdminDashboard() : alert(r.data.error || 'Blad.');
}
async function deleteUser(id, name) {
    if (!confirm('Usunac konto "' + name + '"? Tej operacji nie mozna cofnac.')) return;
    var r = await apiFetch('/users/' + id, { method: 'DELETE' });
    r.ok ? renderAdminDashboard() : alert(r.data.error || 'Blad.');
}

function buildRoleSelector(userId, currentRole, userName) {
    var roles = availableRoles(currentUser.role);
    if (roles.length === 0) return '';
    var myRank = rankIndex(currentUser.role);
    var targetRank = rankIndex(currentRole);
    // Moge zmienic tylko jesli mam wyzsza range
    if (currentUser.role !== 'superadmin' && myRank >= targetRank) return '';

    var opts = '<option value="">-- Zmien range --</option>';
    roles.forEach(function(r) {
        opts += '<option value="' + r + '"' + (r === currentRole ? ' selected' : '') + '>' + r.charAt(0).toUpperCase() + r.slice(1) + '</option>';
    });
    return '<select class="btn-sm" style="background:#e3f2fd;color:#1565c0;cursor:pointer;" data-uid="' + userId + '" data-uname="' + userName + '" onchange="promoteUser(this.dataset.uid,this.dataset.uname,this.value,this)">' + opts + '</select>';
}

async function promoteUser(id, name, newRole, selectEl) {
    if (!newRole) return;
    if (!confirm('Zmienic range uzytkownika "' + name + '" na: ' + newRole + '?')) {
        selectEl.value = '';
        return;
    }
    var r = await apiFetch('/users/' + id + '/promote', { method: 'POST', body: JSON.stringify({ newRole: newRole }) });
    if (r.ok) {
        renderAdminDashboard();
    } else {
        alert(r.data.error || 'Blad.');
        selectEl.value = '';
    }
}

async function switchToUser(userId, userName, userRole) {
    currentViewUserId   = userId;
    currentViewUserRole = userRole || 'user';
    cachedProgress      = {};
    var r = await apiFetch('/progress/' + userId);
    cachedProgress = r.ok ? r.data : {};
    goHome();
    renderSidebar();
    setTimeout(function() {
        var p = document.querySelector('.welcome-header p');
        if (p) p.innerHTML = 'Edytujesz: <strong style="color:var(--f4)">' + userName + '</strong>'
            + ' <span style="font-size:.8em;color:var(--muted)">(' + (ROLE_LABELS[userRole]||userRole) + ')</span>'
            + ' &nbsp;<a href="#" onclick="renderAdminDashboard();return false;" style="font-size:.8em;color:var(--muted)">[Wróć]</a>';
    }, 30);
}

// ================================================================
// UI CORE
// ================================================================
function goHome() {
    document.querySelectorAll('.nav-item').forEach(function(el) { el.classList.remove('active'); });
    var isAdmin = currentUser.role !== 'user';
    document.getElementById('contentArea').innerHTML =
        '<div class="welcome-header">'
        + '<h2>Czuwaj!</h2>'
        + '<p>' + (isAdmin ? 'Tryb edycji podopiecznego' : 'Ksiazeczka Harcerska') + '</p>'
        + '<p id="user-team-info" style="color:var(--primary);font-weight:600;font-size:0.95em;margin-top:4px;"></p>'
        + (isAdmin ? '<button onclick="renderAdminDashboard()" style="background:var(--accent);border:none;color:white;padding:8px 16px;border-radius:8px;cursor:pointer;margin-top:10px;font-size:0.9rem;">&#8592; Wróc do druzyny</button>' : '')
        + '</div>'
        + '<div class="home-card">'
        + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">'
        + '<h3 style="margin:0;color:var(--text-main);">Postep zdobytych sprawnosci</h3>'
        + '<span id="total-progress" style="font-weight:bold;color:var(--primary);font-size:1.2em;">0%</span>'
        + '</div>'
        + '<div class="big-progress-wrapper"><div class="big-progress-fill" id="total-bar"></div></div>'
        + '</div>';
    updateUIStats();
}

function renderSidebar(filterText) {
    filterText = filterText || '';
    var list = document.getElementById('navList');
    list.innerHTML = '';
    var grouped = {};
    db.forEach(function(item) {
        if (!grouped[item.category]) grouped[item.category] = [];
        grouped[item.category].push(item);
    });
    Object.keys(grouped).forEach(function(cat) {
        var filtered = grouped[cat].filter(function(i) { return i.title.toLowerCase().indexOf(filterText.toLowerCase()) !== -1; });
        if (!filtered.length) return;
        var head = document.createElement('li');
        head.className = 'nav-category'; head.textContent = cat; list.appendChild(head);
        filtered.forEach(function(item) {
            var li = document.createElement('li');
            li.className = 'nav-item'; li.id = 'nav-item-' + item.id;
            li.innerHTML = '<span>' + item.title + '</span><span class="nav-progress" id="nav-prog-' + item.id + '">0%</span>';
            li.onclick = function() { loadContent(item.id); };
            list.appendChild(li);
        });
    });
    updateUIStats();
    // Pokaz druzyne zalogowanego usera
    if (currentUser && currentUser.teamId) {
        apiFetch('/my-team').then(function(r) {
            var el = document.getElementById('user-team-info');
            if (el && r.ok && r.data.teamName) el.textContent = '&#128210; ' + r.data.teamName;
        });
    }
}

function loadContent(id) {
    var item = db.find(function(x) { return x.id === id; });
    if (!item) return;
    document.querySelectorAll('.nav-item').forEach(function(el) { el.classList.remove('active'); });
    var navEl = document.getElementById('nav-item-' + id);
    if (navEl) navEl.classList.add('active');
    if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');

    var isAdmin = currentUser.role !== 'user';
    var imagesHtml = '';
    if (item.images && item.images.length) {
        imagesHtml = '<div class="image-gallery">';
        item.images.forEach(function(img) {
            imagesHtml += '<img src="' + img + '" class="gallery-img" onclick="openPhoto(\'' + img + '\')" onerror="this.style.display=\'none\'">';
        });
        imagesHtml += '</div>';
    }

    var html = '<div class="header-section">'
        + '<span class="cat-badge">' + item.category + '</span>'
        + '<h2>' + item.title + '</h2>'
        + imagesHtml
        + '<div style="margin-top:25px;">'
        + '<div style="display:flex;justify-content:space-between;margin-bottom:5px;font-weight:600;color:var(--text-muted);font-size:0.9em;">'
        + '<span>Postep</span><span id="detail-prog-val">0%</span></div>'
        + '<div class="big-progress-wrapper"><div class="big-progress-fill" id="detail-bar"></div></div>'
        + '</div></div>';

    item.groups.forEach(function(g, gIdx) {
        html += '<div class="task-group"><div class="group-title">' + g.name + '</div>';
        g.tasks.forEach(function(t, tIdx) {
            var tId   = id + '-' + gIdx + '-' + tIdx;
            var isDone = !!cachedProgress[tId];
            html += '<label class="cb-container" style="' + (!isAdmin ? 'cursor:default' : '') + '">'
                + '<input type="checkbox" ' + (isDone ? 'checked' : '') + ' ' + (!isAdmin ? 'disabled' : '') + ' data-tid="' + tId + '" onchange="toggleTask(\'' + tId + '\',\'' + id + '\')">'
                + '<div class="checkmark"></div>'
                + '<span class="task-text">' + t.replace(/\*/g,'&#9733;') + '</span>'
                + '</label>';
        });
        html += '</div>';
    });

    document.getElementById('contentArea').innerHTML = html;
    updateItemProgress(id);
    document.querySelector('.main').scrollTop = 0;
}

function updateItemProgress(itemId) {
    var item = db.find(function(x) { return x.id === itemId; });
    if (!item) return;
    var total = 0, done = 0;
    item.groups.forEach(function(g, gi) {
        g.tasks.forEach(function(t, ti) { total++; if (cachedProgress[itemId + '-' + gi + '-' + ti]) done++; });
    });
    var pct = total ? Math.round(done / total * 100) : 0;
    var bar = document.getElementById('detail-bar');
    var val = document.getElementById('detail-prog-val');
    if (bar) bar.style.width = pct + '%';
    if (val) val.textContent = pct + '%';
    var nav = document.getElementById('nav-prog-' + itemId);
    if (nav) nav.textContent = pct + '%';
}

function updateUIStats() {
    var total = 0, done = 0;
    db.forEach(function(item) {
        var iTotal = 0, iDone = 0;
        item.groups.forEach(function(g, gi) {
            g.tasks.forEach(function(t, ti) {
                total++; iTotal++;
                if (cachedProgress[item.id + '-' + gi + '-' + ti]) { done++; iDone++; }
            });
        });
        var nav = document.getElementById('nav-prog-' + item.id);
        if (nav) nav.textContent = (iTotal ? Math.round(iDone / iTotal * 100) : 0) + '%';
    });
    var pct  = total ? Math.round(done / total * 100) : 0;
    var bar  = document.getElementById('total-bar');
    var prog = document.getElementById('total-progress');
    if (bar)  bar.style.width = pct + '%';
    if (prog) prog.textContent = pct + '%';
}

// ================================================================
// HELPERY UI
// ================================================================
function toggleSidebar()    { document.getElementById('sidebar').classList.toggle('open'); }
function openPhoto(src)     { document.getElementById('modalImg').src = src; document.getElementById('photoModal').style.display = 'flex'; document.getElementById('modalImg').classList.remove('zoomed'); }
function closeModal()       { document.getElementById('photoModal').style.display = 'none'; }
function toggleZoom(e)      { e.stopPropagation(); document.getElementById('modalImg').classList.toggle('zoomed'); }
function filterNav()        { renderSidebar(document.getElementById('searchInput').value); }
function openSettings()     { toggleSettingsModal(true); }
function closeSettings(e)   { if (e.target === document.getElementById('settingsModal')) toggleSettingsModal(false); }
function toggleSettingsModal(s) { document.getElementById('settingsModal').style.display = s ? 'flex' : 'none'; }
function loadSettings() {
    var s = JSON.parse(localStorage.getItem('nkih_settings') || '{}');
    if (s.dark)      { document.body.classList.add('dark'); document.body.classList.add('dark-mode'); document.getElementById('darkModeToggle').checked = true; }
    if (s.largeText) { document.body.classList.add('large-text'); document.getElementById('textSizeToggle').checked = true; }
}
function saveSettings() {
    localStorage.setItem('nkih_settings', JSON.stringify({
        dark:      document.body.classList.contains('dark-mode'),
        largeText: document.body.classList.contains('large-text')
    }));
}
function toggleDarkMode() { document.body.classList.toggle('dark'); document.body.classList.toggle('dark-mode'); saveSettings(); }
function toggleTextSize() { document.body.classList.toggle('large-text'); saveSettings(); }
function resetProgress()  { alert('Skontaktuj sie z administratorem.'); }
</script>

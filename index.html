<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ksiazeczka Harcerska</title>
<style>
    :root { --accent: #00ffb4; --bg: #0a0a0f; --text: #e0fff5; --panel: #111122; }
    body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
    .search-box { margin-bottom: 20px; display: flex; gap: 10px; }
    input { padding: 10px; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff; flex: 1; }
    .card-item { background: var(--panel); padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
    .btn-green { background: #28a745; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
    .btn-green:disabled { background: #555; cursor: not-allowed; opacity: 0.6; }
    .stars { color: #ffd700; margin-left: 10px; }
    .filter-btn { padding: 5px 15px; background: #222; border: 1px solid var(--accent); color: white; cursor: pointer; border-radius: 4px; }
    .filter-btn.active { background: var(--accent); color: #000; }
</style>
</head>
<body>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Szukaj sprawności (wpisz min. 2 znaki)...">
        <div id="starFilters">
            <button class="filter-btn" onclick="setStarFilter(0)">Wszystkie</button>
            <button class="filter-btn" onclick="setStarFilter(1)">1*</button>
            <button class="filter-btn" onclick="setStarFilter(2)">2*</button>
            <button class="filter-btn" onclick="setStarFilter(3)">3*</button>
            <button class="filter-btn" onclick="setStarFilter(4)">4*</button>
        </div>
    </div>

    <div id="sprawnosciContainer">
        <p style="text-align:center; color:#888;">Zacznij pisać, aby wyszukać sprawności...</p>
    </div>

<script>
let currentUser = { role: 'druzynowy', name: 'Marek' }; // Symulacja zalogowanego uzytkownika
let allSprawnosci = [
    { sprawnoscId: 's1', name: 'Kuchcik', level: 1 },
    { sprawnoscId: 's2', name: 'Wioślarz', level: 2 },
    { sprawnoscId: 's3', name: 'Ratownik', level: 3 },
    { sprawnoscId: 's4', name: 'Lider', level: 4 },
    { sprawnoscId: 's5', name: 'Higienista', level: 1 }
];

let currentSearch = "";
let currentStars = 0;

function setStarFilter(s) {
    currentStars = s;
    document.querySelectorAll('.filter-btn').forEach((btn, idx) => {
        btn.classList.toggle('active', idx === s);
    });
    renderSprawnosci();
}

document.getElementById('searchInput').addEventListener('input', (e) => {
    currentSearch = e.target.value;
    renderSprawnosci();
});

function renderSprawnosci() {
    const container = document.getElementById('sprawnosciContainer');
    
    // UKRYWANIE JEŚLI NIC NIE WPISANO I NIE MA FILTRA
    if (currentSearch.length < 2 && currentStars === 0) {
        container.innerHTML = '<p style="text-align:center; color:#888;">Wpisz nazwę sprawności lub wybierz poziom gwiazdek...</p>';
        return;
    }

    const filtered = allSprawnosci.filter(s => {
        const matchesText = s.name.toLowerCase().includes(currentSearch.toLowerCase());
        const matchesStars = currentStars === 0 || s.level === currentStars;
        return matchesText && matchesStars;
    });

    if (filtered.length === 0) {
        container.innerHTML = '<p style="text-align:center;">Nie znaleziono sprawności.</p>';
        return;
    }

    container.innerHTML = filtered.map(s => {
        // BLOKADA KSI
        const isHighLevel = s.level >= 3;
        const canApprove = (currentUser.role === 'superadmin' || currentUser.role === 'ksis');
        const disableAttr = (isHighLevel && !canApprove) ? 'disabled title="Wymagane uprawnienia KSI"' : '';

        return `
            <div class="card-item">
                <div>
                    <strong>${s.name}</strong>
                    <span class="stars">${'★'.repeat(s.level)}</span>
                </div>
                <div>
                    <button class="btn-green" ${disableAttr} onclick="approve('${s.sprawnoscId}', ${s.level})">
                        ${isHighLevel && !canApprove ? '🔒 KSI' : 'Zatwierdź'}
                    </button>
                </div>
            </div>
        `;
    }).join('');
}

function approve(id, level) {
    alert('Próba zatwierdzenia sprawności ' + id + ' (Poziom: ' + level + ')');
}

function availableRoles(myRole) {
    if (myRole === 'superadmin') return ['harcerz', 'zastepowy', 'druzynowy', 'ksis', 'superadmin'];
    if (myRole === 'druzynowy') return ['harcerz', 'zastepowy', 'ksis'];
    return [];
}
</script>
</body>
</html>
